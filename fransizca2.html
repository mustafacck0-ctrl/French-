          style={{width:"100%",padding:"11px 14px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"#e0e0ff",fontSize:13,outline:"none",marginBottom:8,boxSizing:"border-box",fontFamily:"monospace"}}
        />
        {err && <div style={{color:"#f87171",fontSize:12,marginBottom:8,textAlign:"center"}}>{err}</div>}
        <button onClick={test} disabled={!val.trim()||testing}
          style={{width:"100%",padding:"12px",background:"linear-gradient(135deg,#1a6a3a,#2a9a5a)",color:"#fff",border:"none",borderRadius:13,fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:8,opacity:val.trim()?1:0.4}}>
          "✓ Kaydet ve Aktifleştir"
        </button>
        <button onClick={()=>onSave("")}
          style={{width:"100%",padding:"10px",background:"transparent",color:"#404060",border:"1px solid rgba(255,255,255,0.07)",borderRadius:13,fontSize:12,cursor:"pointer"}}>
          Şimdilik atla (basit kontrol kullan)
        </button>
      </div>
    </div>
  );
}

// ─── CÜMLE KONTROL (Google Gemini) ───────────────────────────────────────────
async function checkSentenceAPI(word, sentence) {
  const key = getApiKey();
  if (!key) return checkSentenceLocal(word, sentence);
  try {
    const prompt = `Sen sıkı bir Fransızca öğretmenisin. Öğrencinin yazdığı cümleyi en ince ayrıntısına kadar kontrol et.

Kelime: "${word.fr}" (Türkçe: ${word.tr})
Öğrencinin cümlesi: "${sentence}"

Kontrol kriterleri (HEPSİ doğru olmalı):
- Kelime cümle içinde doğru ve anlamlı kullanılmış mı?
- Fiil çekimi (kişi, zaman) doğru mu?
- Cinsiyet uyumu (eril/dişil — le/la, un/une, mon/ma vb.) doğru mu?
- Noktalama: cümle büyük harfle başlıyor mu, nokta/ünlem/soru işareti var mı?
- Kelime sırası Fransızca kurallarına uygun mu?
- Yazım hataları (accent, cedille vb.) var mı?
- Cümle anlamlı ve tutarlı mı?

Eğer herhangi bir hata varsa correct:false döndür. Sadece her açıdan kusursuz cümleler correct:true olmalı.
Score: 0-100 arası puan ver. Mükemmel cümle=95-100, küçük hata=60-84, büyük hata=10-50.
SADECE JSON döndür, başka hiçbir şey yazma:
{"correct":true/false,"score":85,"feedback":"Türkçe detaylı açıklama","corrected":"düzeltilmiş cümle veya null"}`;

    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.1} })
    });
    if (!res.ok) throw new Error(res.status);
    const d = await res.json();
    const text = d.candidates?.[0]?.content?.parts?.[0]?.text||"";
    const parsed = JSON.parse(text.replace(/```json|```/g,"").trim());
    // API skoru yoksa ekle
    if (parsed.score === undefined) {
      parsed.score = parsed.correct ? 93 : 35;
    }
    return parsed;
  } catch(e) {
    return checkSentenceLocal(word, sentence);
  }
}

// ─── AKILLI FRANSIZCA KONTROL ────────────────────────────────────────────────
function normFr(t) {
  return t.toLowerCase()
    .replace(/[àâä]/g,"a").replace(/[éèêë]/g,"e").replace(/[îï]/g,"i")
    .replace(/[ôö]/g,"o").replace(/[ùûü]/g,"u").replace(/ç/g,"c")
    .replace(/\u2019|\u2018/g,"'");
}

const VERB_ERRORS = [
  [/\bje (est|sont|êtes|sommes)\b/i, '"je" ile doğru fiil "suis" — "je est" değil, "je suis" olmalı.'],
  [/\btu (est|suis|sont|sommes)\b/i, '"tu" ile doğru fiil "es" — "tu es" olmalı.'],
  [/\bil (suis|es|sommes|êtes)\b/i, '"il" ile doğru fiil "est" — "il est" olmalı.'],
  [/\belle (suis|es|sommes|êtes)\b/i, '"elle" ile doğru fiil "est" — "elle est" olmalı.'],
  [/\bnous (est|es|suis|sont)\b/i, '"nous" ile doğru fiil "sommes" — "nous sommes" olmalı.'],
  [/\bvous (est|es|suis|sont)\b/i, '"vous" ile doğru fiil "êtes" — "vous êtes" olmalı.'],
  [/\bils (est|es|suis|sommes)\b/i, '"ils" ile doğru fiil "sont" — "ils sont" olmalı.'],
  [/\belles (est|es|suis|sommes)\b/i, '"elles" ile doğru fiil "sont" — "elles sont" olmalı.'],
  [/\bje avoir\b/i, 'Fiil çekimsiz kullanılmış — "avoir" yerine "j\'ai" kullan.'],
  [/\bje aller\b/i, 'Fiil çekimsiz kullanılmış — "aller" yerine "je vais" kullan.'],
  [/\bje vouloir\b/i, '"vouloir" çekimsiz — "je veux" olmalı.'],
  [/\bje pouvoir\b/i, '"pouvoir" çekimsiz — "je peux" olmalı.'],
  [/\bje savoir\b/i, '"savoir" çekimsiz — "je sais" olmalı.'],
  [/\bje faire\b/i, '"faire" çekimsiz — "je fais" olmalı.'],
  [/\bje partir\b/i, '"partir" çekimsiz — "je pars" olmalı.'],
  [/\bje venir\b/i, '"venir" çekimsiz — "je viens" olmalı.'],
];

const ACCENT_ERRORS = [
  [/\betre\b/gi, "être", '"etre" değil "être" olmalı.'],
  [/\bdeja\b/gi, "déjà", '"deja" değil "déjà" olmalı.'],
  [/\bcafe\b/gi, "café", '"cafe" değil "café" olmalı.'],
  [/\beleve\b/gi, "élève", '"eleve" değil "élève" olmalı.'],
  [/\bprete\b/gi, "prête", '"prete" değil "prête" olmalı.'],
  [/\bfete\b/gi, "fête", '"fete" değil "fête" olmalı.'],
];

const GENDER_MAP = {
  "maison":["une","féminin"],"eau":["de l'","féminin"],"ville":["une","féminin"],
  "voiture":["une","féminin"],"table":["une","féminin"],"porte":["une","féminin"],
  "nuit":["une","féminin"],"école":["une","féminin"],"rue":["une","féminin"],
  "heure":["une","féminin"],"semaine":["une","féminin"],"fenêtre":["une","féminin"],
  "livre":["un","masculin"],"café":["un","masculin"],"restaurant":["un","masculin"],
  "travail":["un","masculin"],"ami":["un","masculin"],"jour":["un","masculin"],
  "matin":["un","masculin"],"soir":["un","masculin"],"temps":["un","masculin"],
  "homme":["un","masculin"],"garçon":["un","masculin"],"chien":["un","masculin"],
  "chat":["un","masculin"],"problème":["un","masculin"],"livre":["un","masculin"],
};

function checkSentenceLocal(word, sentence) {
  const s = sentence.trim();
  if (!s) return { correct:false, feedback:"Cümle boş.", corrected:null };
  const sLow = s.toLowerCase();
  const sNorm = normFr(s);
  const frNorm = normFr(word.fr);
  const errors = [];

  // 1. Minimum uzunluk
  const wc = s.split(/\s+/).filter(x=>x.length>0).length;
  if (wc < 2) return { correct:false, feedback:"Çok kısa — en az 3 kelimelik tam bir cümle yaz.", corrected:null };

  // 2. Kelime kullanıldı mı?
  if (!sNorm.includes(frNorm) && !sLow.includes(word.fr.toLowerCase()))
    return { correct:false, feedback:`"${word.fr}" kelimesini cümlende kullanmamışsın. Bu kelimeyi mutlaka kullan.`, corrected:null };

  // 3. Büyük harf
  if (s[0] !== s[0].toUpperCase() || s[0] === s[0].toLowerCase())
    errors.push("Cümle büyük harfle başlamalı.");

  // 4. Noktalama
  if (!/[.!?]\s*$/.test(s))
    errors.push("Cümlenin sonuna nokta (.), ünlem (!) veya soru işareti (?) ekle.");

  // 5. Fiil çekimi
  for (const [re, msg] of VERB_ERRORS) {
    if (re.test(sLow)) { errors.push(msg); break; }
  }

  // 6. Accent hataları
  for (const [re, correct, msg] of ACCENT_ERRORS) {
    re.lastIndex = 0;
    if (re.test(sNorm)) { errors.push(msg); break; }
  }

  // 7. Cinsiyet uyumu
  const g = GENDER_MAP[word.fr.toLowerCase()];
  if (g) {
    const [correctArt, genre] = g;
    const wrongArt = genre === "féminin" ? "un " : "une ";
    const fr = word.fr.toLowerCase();
    if (sLow.includes(wrongArt + fr))
      errors.push(`"${word.fr}" ${genre} bir kelime — "${wrongArt.trim()} ${word.fr}" değil, "${correctArt} ${word.fr}" olmalı.`);
  }

  // 8. "ne...pas" olumsuzluk
  const hasNe = /\bne\b/.test(sLow);
  const hasPas = /\bpas\b/.test(sLow);
  if (hasNe && !hasPas) errors.push('Olumsuzlukta "ne" ile birlikte "pas" de gerekli — "ne ... pas" yapısı.');
  if (hasPas && !hasNe && !sLow.includes("pas de") && !sLow.includes("pas du"))
    errors.push('"pas" tek başına kullanılmış — olumsuzluk için "ne ... pas" yapısı gerekli.');

  // 9. "de le/de la" birleşimi
  if (/\bde le\b/.test(sLow)) errors.push('"de le" değil "du" kullanılmalı (de + le = du).');
  if (/\bde les\b/.test(sLow)) errors.push('"de les" değil "des" kullanılmalı (de + les = des).');
  if (/\bà le\b/.test(sLow)) errors.push('"à le" değil "au" kullanılmalı (à + le = au).');
  if (/\bà les\b/.test(sLow)) errors.push('"à les" değil "aux" kullanılmalı (à + les = aux).');

  if (errors.length > 0) {
    // Her hata için skor düş
    const errScore = Math.max(10, 70 - (errors.length * 20));
    return {
      correct: false,
      feedback: errors.length === 1 ? "❌ " + errors[0] : "❌ " + errors.map((e,i)=>`${i+1}. ${e}`).join("\n"),
      corrected: null,
      score: errScore
    };
  }

  const bonus = wc >= 7 ? " Çok detaylı bir cümle, harika!" : wc >= 5 ? " Güzel ve eksiksiz bir cümle!" : "";
  // Hata yoksa 90-100 arası skor ver (kelime uzunluğuna ve kalitesine göre)
  const baseScore = wc >= 6 ? 97 : wc >= 4 ? 93 : 90;
  return { correct:true, feedback:`✅ Harika! "${word.fr}" kelimesini doğru kullandın.${bonus}`, corrected:null, score:baseScore };
}

function App() {
  const [state, setState] = useState(() => load() || INIT);
  const [tab, setTab] = useState("home");
  const [view, setView] = useState("home");
  const [quizState, setQuizState] = useState(null);
  const [inputVal, setInputVal] = useState("");
  const [toast, setToast] = useState("");
  const [practiceWord, setPracticeWord] = useState(null);
  const [sentInput, setSentInput] = useState("");
  const [sentFeedback, setSentFeedback] = useState(null);
  const [sentLoading, setSentLoading] = useState(false);
  const [prevView, setPrevView] = useState("home");
  const [historyBatch, setHistoryBatch] = useState(null);
  const [apiKey, setApiKey] = useState(() => getApiKey());
  const [showApiModal, setShowApiModal] = useState(() => !getApiKey());
  const { speak, cancel, ready } = useSpeech();

  useEffect(() => { save(state); }, [state]);

  const notify = (m) => { setToast(m); setTimeout(() => setToast(""), 3000); };
  const td = today();

  const pendingReviews = useCallback(() => {
    const p = [];
    state.batches.forEach((b, bi) => [1,3,6].forEach(d => {
      const due = new Date(b.sentDate); due.setDate(due.getDate() + d);
      if (due.toISOString().slice(0,10) <= td && !b.reviewedOn?.[d]) p.push({ bi, d, b });
    }));
    return p;
  }, [state.batches, td])();

  const [pendingBatchView, setPendingBatchView] = useState(false);
  useEffect(() => {
    if (pendingBatchView && state.batches.length > 0) {
      setView("batch");
      setPendingBatchView(false);
    }
  }, [pendingBatchView, state.batches]);

  const sendBatch = () => {
    if (state.pendingBatch) { setView("batch"); return; }

    // Hikaye kelimeleri: henüz batch'e girmemiş olanlar
    const seenFr = new Set([
      ...(state.batches.flatMap(b => b.words.map(w => w.fr))),
    ]);
    const storyQueue = (state.storyWords || [])
      .filter(sw => !seenFr.has(sw.fr))
      .map(sw => ({
        fr: sw.fr, tr: sw.tr,
        example: sw.example || `${sw.fr} — (yükleniyor...)`,
        img: IMG(42 + sw.fr.charCodeAt(0) % 900),
        imgAlt: sw.fr,
        fromStory: true,
      }));

    // Kaç hikaye kelimesi koyacağız? Max 3, kalan slotlar DAILY_BATCHES'ten
    const storySlice = storyQueue.slice(0, Math.min(3, storyQueue.length));
    const regularCount = 5 - storySlice.length;

    // Normal kelimeler
    const hasRegular = state.currentBatchIndex < DAILY_BATCHES.length;
    const regularWords = hasRegular ? DAILY_BATCHES[state.currentBatchIndex].slice(0, regularCount) : [];

    const words = [...storySlice, ...regularWords];
    if (words.length === 0) { notify("🎉 Tüm grupları tamamladın!"); return; }

    // currentBatchIndex sadece normal kelime kullanıldıysa ilerleyecek (Anladım'da)
    setState(s => ({
      ...s,
      pendingBatch: {
        sentDate: td,
        words: words.map(w => ({...w})),
        reviewedOn: {}, failedReviews: {},
        usedRegular: hasRegular && regularWords.length > 0,
        storyWordsUsed: storySlice.map(w => w.fr),
      },
      lastSentDate: td
    }));
    setPendingBatchView(true);
  };

  const startReview = (bi, d) => { setQuizState({ type:"review", bi, d, words:[...state.batches[bi].words], cur:0, results:[] }); setView("quiz"); setInputVal(""); };
  const startHard = () => { if (!state.difficultWords.length) return; setQuizState({ type:"hard", words:[...state.difficultWords], cur:0, results:[] }); setView("quiz"); setInputVal(""); };

  const handleAnswer = () => {
    const word = quizState.words[quizState.cur];
    const correct = inputVal.trim().toLowerCase() === word.fr.toLowerCase();
    const nr = [...quizState.results, { word, correct, given: inputVal.trim() }];
    if (quizState.cur + 1 < quizState.words.length) { setQuizState(q => ({ ...q, cur: q.cur+1, results: nr })); setInputVal(""); }
    else finishQuiz({ ...quizState, results: nr });
  };

  const finishQuiz = (fq) => {
    const failed = fq.results.filter(r => !r.correct).map(r => r.word);
    if (fq.type === "review") {
      setState(s => {
        const batches = s.batches.map((b, i) => { if (i !== fq.bi) return b; const fr2 = {...b.failedReviews}; if (failed.length) fr2[fq.d] = failed.map(w=>w.fr); return {...b, reviewedOn:{...b.reviewedOn,[fq.d]:td}, failedReviews:fr2}; });
        let dw = [...s.difficultWords]; failed.forEach(fw => { if (!dw.find(d=>d.fr===fw.fr)) dw.push(fw); });
        return {...s, batches, difficultWords:dw};
      });
    } else { const ff = new Set(failed.map(w=>w.fr)); setState(s => ({...s, difficultWords: s.difficultWords.filter(w=>ff.has(w.fr))})); }
    setQuizState({...fq, done:true}); setView("result");
  };

  const openPractice = (word, from="batch") => { setPracticeWord(word); setSentInput(""); setSentFeedback(null); setPrevView(from); setView("sentence"); };

  const submitSentence = async () => {
    if (!sentInput.trim()) return;
    setSentLoading(true); setSentFeedback(null);
    try {
      const r = await checkSentenceAPI(practiceWord, sentInput.trim());
      setSentFeedback(r);
      setState(s => ({ ...s, userSentences: { ...s.userSentences, [practiceWord.fr]: [...(s.userSentences?.[practiceWord.fr]||[]), { sentence: sentInput.trim(), feedback: r.feedback, correct: r.correct, corrected: r.corrected, date: td }] } }));
    } catch { setSentFeedback({ correct: null, feedback: "Bağlantı hatası. Tekrar dene.", corrected: null }); }
    setSentLoading(false);
  };

  const saveGrammar = (id, data) => setState(s => ({...s, grammar:{...s.grammar,[id]:data}}));

  // ── STREAK & TIMER ────────────────────────────────────────────────────────
  const GOAL_SECS = 10 * 60; // 10 minutes
  const [streakCelebration, setStreakCelebration] = useState(false);

  // Reset todaySeconds if it's a new day
  useEffect(() => {
    setState(s => {
      if (s.todayStreakDate !== td) {
        return { ...s, todaySeconds: 0, todayStreakDone: false, todayStreakDate: td };
      }
      return s;
    });
  }, [td]);

  // Tick ONLY while app is visible and in focus — pauses when user leaves
  const intervalRef = useRef(null);

  const awardStreak = (s) => {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yStr = yesterday.toISOString().slice(0, 10);
    const lastWasYesterday = s.lastStreakDate === yStr || s.lastStreakDate === td;
    const newStreak = lastWasYesterday ? (s.streak || 0) + 1 : 1;
    setStreakCelebration(true);
    setTimeout(() => setStreakCelebration(false), 3500);
    return { ...s, todaySeconds: GOAL_SECS, todayStreakDone: true, streak: newStreak, lastStreakDate: td };
  };

  const startTicking = () => {
    if (intervalRef.current) return;
    intervalRef.current = setInterval(() => {
      setState(s => {
        if (s.todayStreakDone) return s;
        const newSecs = (s.todaySeconds || 0) + 1;
        if (newSecs >= GOAL_SECS) return awardStreak(s);
        return { ...s, todaySeconds: newSecs };
      });
    }, 1000);
  };

  const stopTicking = () => {
    if (intervalRef.current) { clearInterval(intervalRef.current); intervalRef.current = null; }
  };

  useEffect(() => {
    if (!document.hidden) startTicking();
    const onVisChange = () => document.hidden ? stopTicking() : startTicking();
    const onBlur  = () => stopTicking();
    const onFocus = () => { if (!document.hidden) startTicking(); };
    document.addEventListener("visibilitychange", onVisChange);
    window.addEventListener("blur", onBlur);
    window.addEventListener("focus", onFocus);
    return () => {
      stopTicking();
      document.removeEventListener("visibilitychange", onVisChange);
      window.removeEventListener("blur", onBlur);
      window.removeEventListener("focus", onFocus);
    };
  }, []);

  const todaySecs = state.todaySeconds || 0;
  const remaining = Math.max(0, GOAL_SECS - todaySecs);
  const remMins = Math.floor(remaining / 60);
  const remSecs = remaining % 60;
  const timerDone = state.todayStreakDone;
  const timerPct = Math.min(100, (todaySecs / GOAL_SECS) * 100);
  const streak = state.streak || 0;

  // Milestone badges
  const MILESTONES = [1, 2, 3, 5, 7, 10, 14, 21, 30, 50, 100, 200, 365];
  const nextMilestone = MILESTONES.find(m => m > streak) || 365;
  const prevMilestone = [...MILESTONES].reverse().find(m => m <= streak) || 0;



  const allWords = state.batches.flatMap(b => b.words);
  const totalSent = Object.values(state.userSentences||{}).flat().length;

  // ── VIEWS ─────────────────────────────────────────────────────
  // SENTENCE
  if (view === "sentence" && practiceWord) {
    const hist = state.userSentences?.[practiceWord.fr] || [];
    return (
      <div style={C.page}>
        <div style={C.card}>
          <button style={C.back} onClick={() => setView(prevView)}>← Geri</button>
          <div style={{ textAlign:"center", marginBottom:16 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:10, marginBottom:4 }}>
              <span style={C.frBig}>{practiceWord.fr}</span>
              <SpeakBtn text={practiceWord.fr} speak={speak} cancel={cancel} size={18} />
            </div>
            <span style={C.trSub}>{practiceWord.tr}</span>
          </div>
          {practiceWord.img && <WordImage src={practiceWord.img} alt={practiceWord.imgAlt||practiceWord.tr} word={practiceWord.fr} />}
          <div style={C.exBox}>
            <div style={C.exLabel}>📖 Örnek cümle</div>
            <div style={{ display:"flex", alignItems:"flex-start", gap:8 }}>
              <span style={{ ...C.exText, flex:1 }}>{practiceWord.example}</span>
              <SpeakBtn text={frOnly(practiceWord.example)} speak={speak} cancel={cancel} size={13} />
            </div>
          </div>
          <div style={C.pBox}>
            <div style={C.pLabel}>✏️ Kendi cümleni yaz:</div>
            <textarea style={C.textarea} value={sentInput} onChange={e=>setSentInput(e.target.value)} placeholder={`"${practiceWord.fr}" kelimesini kullanarak Fransızca bir cümle yaz...`} rows={3}/>
            <button style={{...C.btn, opacity: sentInput.trim()&&!sentLoading?1:0.4}} onClick={submitSentence} disabled={!sentInput.trim()||sentLoading}>
              {sentLoading?"⏳ Kontrol ediliyor...":"Kontrol Et →"}
            </button>
          </div>
          {sentFeedback && (
            <div style={{...C.fbBox, borderColor: sentFeedback.correct?"#4ade8060":sentFeedback.correct===false?"#f8717160":"#fbbf2460", background: sentFeedback.correct?"rgba(74,222,128,0.06)":sentFeedback.correct===false?"rgba(248,113,113,0.06)":"rgba(251,191,36,0.06)"}}>
              <div style={{fontSize:28,marginBottom:8}}>{sentFeedback.correct?"✅":sentFeedback.correct===false?"❌":"⚠️"}</div>
              <div style={{color:"#d0d0e8",lineHeight:1.7,fontSize:14}}>{sentFeedback.feedback}</div>
              {sentFeedback.corrected && (
                <div style={C.corrBox}>
                  <div style={{color:"#506050",fontSize:10,marginBottom:5,fontWeight:700,textTransform:"uppercase"}}>Düzeltilmiş hali:</div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{color:"#4ade80",fontStyle:"italic",fontSize:14}}>{sentFeedback.corrected}</span>
                    <SpeakBtn text={sentFeedback.corrected} speak={speak} cancel={cancel} size={12}/>
                  </div>
                </div>
              )}
              <button style={{...C.btn,marginTop:12,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",fontSize:13}} onClick={()=>{setSentInput("");setSentFeedback(null);}}>Yeniden Dene</button>
            </div>
          )}
          {hist.length > 0 && (
            <div style={{marginTop:20}}>
              <div style={C.secTitle}>📝 Geçmiş Cümlelerim</div>
              {[...hist].reverse().map((h,i)=>(
                <div key={i} style={{...C.histItem, borderColor:h.correct?"#4ade8040":"#f8717140"}}>
                  <div style={{display:"flex",gap:6,marginBottom:4}}>
                    <span style={{color:h.correct?"#4ade80":"#f87171",fontStyle:"italic",fontSize:13,flex:1}}>{h.correct?"✅":"❌"} {h.sentence}</span>
                    <SpeakBtn text={h.sentence} speak={speak} cancel={cancel} size={11}/>
                  </div>
                  {h.corrected&&<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}><span style={{color:"#4ade80",fontSize:12}}>→ {h.corrected}</span><SpeakBtn text={h.corrected} speak={speak} cancel={cancel} size={10}/></div>}
                  <div style={{color:"#606080",fontSize:11}}>{h.feedback}</div>
                  <div style={{color:"#404058",fontSize:10,marginTop:3}}>{h.date}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  // BATCH
  const currentBatch = state.pendingBatch;
  // HISTORY BATCH VIEW
  if (historyBatch) {
    const { batch: hb, index: hi } = historyBatch;
    return <FlashcardView
      words={hb.words}
      title={`Grup ${hi+1} · ${new Date(hb.sentDate).toLocaleDateString("tr-TR")}`}
      speak={speak} cancel={cancel}
      userSentences={state.userSentences}
      onAddHard={(word) => setState(s => {
        if (s.difficultWords.find(d=>d.fr===word.fr)) return s;
        return {...s, difficultWords:[...s.difficultWords, word]};
      })}
      onSentence={(word, result) => {
        setState(s => ({ ...s, userSentences: { ...s.userSentences, [word.fr]: [...(s.userSentences?.[word.fr]||[]), result] } }));
      }}
      onDone={() => setHistoryBatch(null)}
      onBack={() => setHistoryBatch(null)}
    />;
  }

  if (view === "batch") {
    if (!currentBatch) { setView("home"); return null; }
    return <FlashcardView
      words={currentBatch.words}
      title={`Grup ${state.currentBatchIndex + 1} · Yeni Kelimeler`}
      speak={speak} cancel={cancel}
      userSentences={state.userSentences}
      onAddHard={(word) => setState(s => {
        if (s.difficultWords.find(d=>d.fr===word.fr)) return s;
        return {...s, difficultWords:[...s.difficultWords, word]};
      })}
      onSentence={(word, result) => {
        setState(s => ({ ...s, userSentences: { ...s.userSentences, [word.fr]: [...(s.userSentences?.[word.fr]||[]), result] } }));
      }}
      onDone={() => {
        setState(s => {
          const pb = s.pendingBatch;
          const usedStory = new Set(pb.storyWordsUsed || []);
          return {
            ...s,
            batches: [...s.batches, pb],
            currentBatchIndex: pb.usedRegular ? s.currentBatchIndex + 1 : s.currentBatchIndex,
            storyWords: (s.storyWords || []).filter(w => !usedStory.has(w.fr)),
            pendingBatch: null,
          };
        });
        setView("home");
        notify("✅ Grup kaydedildi!");
      }}
      onBack={() => setView("home")}
    />;
  }


  // QUIZ
  if (view === "quiz" && quizState && !quizState.done) {
    const word = quizState.words[quizState.cur];
    return (
      <div style={C.page}>
        <div style={C.card}>
          <button style={C.back} onClick={()=>{setView("home");setQuizState(null);}}>← Ana Sayfa</button>
          <div style={C.pbar}><div style={{...C.pfill, width:`${(quizState.cur/quizState.words.length)*100}%`}}/></div>
          <div style={C.badge}>{quizState.type==="hard"?"⚡ Zor Kelimeler":`🔁 Tekrar · +${quizState.d}. Gün`}</div>
          <div style={C.quizCount}>{quizState.cur+1} / {quizState.words.length}</div>
          <p style={C.quizPrompt}>Bu kelimenin Fransızcasını yaz:</p>
          <div style={C.trBig}>{word.tr}</div>
          <input style={C.input} value={inputVal} onChange={e=>setInputVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&inputVal.trim()&&handleAnswer()} placeholder="Fransızcasını yaz..." autoFocus/>
          <button style={{...C.btn,opacity:inputVal.trim()?1:0.4}} onClick={handleAnswer} disabled={!inputVal.trim()}>Kontrol Et →</button>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:14}}>
            <SpeakBtn text={word.fr} speak={speak} cancel={cancel} size={14}/>
            <span style={{color:"#404060",fontSize:12}}>telaffuzu dinle</span>
          </div>
        </div>
      </div>
    );
  }

  // RESULT
  if (view === "result" && quizState) {
    const correct = quizState.results.filter(r=>r.correct).length;
    const score = Math.round((correct/quizState.results.length)*100);
    return (
      <div style={C.page}>
        <div style={C.card}>
          <button style={C.back} onClick={()=>{setView("home");setQuizState(null);}}>← Ana Sayfa</button>
          <div style={{color:score>=80?"#4ade80":score>=50?"#fbbf24":"#f87171",fontSize:52,fontWeight:900,textAlign:"center",margin:"10px 0"}}>{score}%</div>
          <p style={{textAlign:"center",color:"#a0a0b0",marginBottom:18}}>{correct}/{quizState.results.length} doğru</p>
          {quizState.results.map((r,i)=>(
            <div key={i} style={{...C.resultRow, borderColor:r.correct?"#4ade8030":"#f8717130", flexDirection:"column", padding:0, overflow:"hidden"}}>
              {r.word.img && (
                <div style={{position:"relative",height:70,overflow:"hidden"}}>
                  <img src={r.word.img} alt={r.word.imgAlt} style={{width:"100%",height:70,objectFit:"cover",filter:r.correct?"none":"grayscale(50%)"}}/>
                  <div style={{position:"absolute",inset:0,background:r.correct?"linear-gradient(to right,rgba(74,222,128,0.3),transparent)":"linear-gradient(to right,rgba(248,113,113,0.3),transparent)"}}/>
                  <span style={{position:"absolute",top:5,left:8,fontSize:16}}>{r.correct?"✅":"❌"}</span>
                </div>
              )}
              <div style={{padding:"8px 12px"}}>
                <div style={{color:"#e0e0f0",fontWeight:700,fontSize:14}}>{r.word.tr}</div>
                <div style={{display:"flex",alignItems:"center",gap:5,color:"#a0a0b0",fontSize:12,marginTop:2}}>
                  <span>Doğru: <span style={{color:"#4ade80"}}>{r.word.fr}</span></span>
                  <SpeakBtn text={r.word.fr} speak={speak} cancel={cancel} size={10}/>
                  {!r.correct&&<span>· Yazdığın: <span style={{color:"#f87171"}}>{r.given||"—"}</span></span>}
                </div>
                <button style={C.miniBtn} onClick={()=>openPractice(r.word,"result")}>✏️ Cümle yaz</button>
              </div>
            </div>
          ))}
          <button style={C.btn} onClick={()=>{setView("home");setQuizState(null);}}>Ana Sayfaya Dön</button>
        </div>
      </div>
    );
  }

  // HOME
  return (
    <div style={C.page}>
      {showApiModal && <ApiKeyModal onSave={(k) => { setApiKey(k); setShowApiModal(false); }}/>}
      {toast && <div style={C.toast}>{toast}</div>}

      {/* ── STREAK CELEBRATION OVERLAY ── */}
      {streakCelebration && (
        <div style={{ position:"fixed", inset:0, zIndex:9998, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:12, background:"rgba(0,0,0,0.75)", backdropFilter:"blur(8px)", animation:"fadeIn 0.3s ease" }}>
          <div style={{ fontSize:72, animation:"bounce 0.6s ease infinite alternate" }}>🔥</div>
          <div style={{ color:"#fff", fontSize:28, fontWeight:900, textAlign:"center" }}>
            {streak === 1 ? "İlk Gün!" : `${streak} Günlük Seri!`}
          </div>
          <div style={{ color:"#fbbf24", fontSize:16, fontWeight:700 }}>
            {streak >= 100 ? "🏆 Efsane!" : streak >= 30 ? "🥇 Muhteşem!" : streak >= 10 ? "💎 Harika!" : streak >= 5 ? "🌟 Süper!" : "✨ Devam et!"}
          </div>
          {nextMilestone > streak && (
            <div style={{ color:"rgba(255,255,255,0.4)", fontSize:13 }}>Sonraki hedef: {nextMilestone} gün</div>
          )}
          <style>{`@keyframes bounce{0%{transform:scale(1) rotate(-5deg)}100%{transform:scale(1.15) rotate(5deg)}} @keyframes fadeIn{from{opacity:0}to{opacity:1}}`}</style>
        </div>
      )}

      <div style={C.card}>
        <div style={C.header}>
          <span style={{fontSize:42}}>🇫🇷</span>
          <h1 style={C.appTitle}>Fransızca Öğren</h1>
          <p style={C.subtitle}>Aralıklı Tekrar · 1-3-6</p>
          <button onClick={()=>setShowApiModal(true)} style={{marginTop:6,display:"inline-flex",alignItems:"center",gap:5,background:apiKey?"rgba(74,222,128,0.08)":"rgba(255,100,100,0.08)",border:apiKey?"1px solid rgba(74,222,128,0.25)":"1px solid rgba(255,100,100,0.25)",borderRadius:20,padding:"3px 12px",fontSize:11,color:apiKey?"#4ade80":"#f87171",cursor:"pointer"}}>
            {apiKey?"🤖 AI Kontrol Aktif":"⚠️ AI Kontrol Kapalı · Ayarla"}
          </button>

        </div>

        {/* ── STREAK + TIMER WIDGET ── */}
        <div style={{ marginBottom:18, borderRadius:18, overflow:"hidden", border:"1px solid rgba(255,255,255,0.08)", background:"rgba(255,255,255,0.03)" }}>
          {/* Top row: streak flame + timer */}
          <div style={{ display:"flex", alignItems:"stretch" }}>
            {/* Streak */}
            <div style={{ flex:1, padding:"14px 16px", borderRight:"1px solid rgba(255,255,255,0.07)", display:"flex", alignItems:"center", gap:10 }}>
              <div style={{ fontSize:32, filter: streak > 0 ? "none" : "grayscale(1) opacity(0.3)" }}>🔥</div>
              <div>
                <div style={{ color: streak > 0 ? "#ff8c42" : "#404060", fontSize:26, fontWeight:900, lineHeight:1 }}>{streak}</div>
                <div style={{ color:"#505070", fontSize:10, marginTop:1 }}>günlük seri</div>
              </div>
              {streak >= prevMilestone && prevMilestone > 0 && (
                <div style={{ marginLeft:"auto", background:"rgba(255,140,50,0.15)", border:"1px solid rgba(255,140,50,0.3)", borderRadius:20, padding:"2px 8px", fontSize:10, color:"#ff8c42", fontWeight:700 }}>
                  🏅 {prevMilestone}g
                </div>
              )}
            </div>
            {/* Timer */}
            <div style={{ flex:1, padding:"14px 16px", display:"flex", alignItems:"center", gap:10 }}>
              <div style={{ fontSize:28 }}>{timerDone ? "✅" : "⏱️"}</div>
              <div>
                <div style={{ color: timerDone ? "#4ade80" : remaining < 60 ? "#fbbf24" : "#e0e0f0", fontSize:22, fontWeight:900, lineHeight:1, fontVariantNumeric:"tabular-nums" }}>
                  {timerDone ? "Tamam!" : `${remMins}:${String(remSecs).padStart(2,"0")}`}
                </div>
                <div style={{ color:"#505070", fontSize:10, marginTop:1 }}>{timerDone ? "8 dk tamamlandı 🎉" : "hedefe kalan"}</div>
              </div>
            </div>
          </div>

          {/* Progress bar */}
          <div style={{ height:6, background:"rgba(255,255,255,0.05)" }}>
            <div style={{
              height:"100%",
              width:`${timerPct}%`,
              background: timerDone ? "linear-gradient(90deg,#4ade80,#22c55e)" : timerPct > 66 ? "linear-gradient(90deg,#fbbf24,#f59e0b)" : "linear-gradient(90deg,#6366f1,#8b5cf6)",
              transition:"width 1s linear",
              borderRadius: timerPct >= 100 ? 0 : "0 3px 3px 0",
            }} />
          </div>

          {/* Milestone progress */}
          <div style={{ padding:"8px 16px 10px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div style={{ color:"#404060", fontSize:11 }}>
              {timerDone ? "🌙 Bugün tamamlandı — yarın da devam et!" : `Bugün ${Math.floor(todaySecs/60)} dk ${todaySecs%60} sn aktif`}
            </div>
            <div style={{ color:"#505070", fontSize:10 }}>
              {nextMilestone > streak ? `→ ${nextMilestone}g` : "🏆"}
            </div>
          </div>

          {/* Milestone dots */}
          <div style={{ padding:"0 16px 12px", display:"flex", gap:5, flexWrap:"wrap" }}>
            {MILESTONES.filter(m => m <= Math.max(streak + 10, 10)).map(m => (
              <div key={m} style={{
                padding:"2px 8px", borderRadius:20, fontSize:10, fontWeight:700,
                background: streak >= m ? "rgba(255,140,50,0.2)" : "rgba(255,255,255,0.04)",
                border: `1px solid ${streak >= m ? "rgba(255,140,50,0.5)" : "rgba(255,255,255,0.08)"}`,
                color: streak >= m ? "#ff8c42" : "#303050",
              }}>
                {streak >= m ? "🔥" : "○"} {m}g
              </div>
            ))}
          </div>
        </div>

        {/* Tabs */}
        <div style={{...C.tabBar, flexWrap:"wrap"}}>
          {[{id:"home",label:"📖 Kelimeler",doneKey:"home"},{id:"grammar",label:"📐 Dilbilgisi",doneKey:"grammar"},{id:"roleplay",label:"🎭 Rol Yapma",doneKey:"roleplay"},{id:"stories",label:"📚 Hikayeler",doneKey:"stories"}].map(t=>{
            const dayDone = t.doneKey && (() => {
              if (t.doneKey==="home") {
                return state.lastSentDate === td && !state.pendingBatch &&
                  state.batches.length > 0 &&
                  state.batches[state.batches.length-1].sentDate === td;
              }
              const comp = state.completed?.[t.doneKey]||{};
              if (t.doneKey==="grammar") {
                const dayIdx = Math.floor((new Date()-new Date("2024-01-01"))/86400000) % GRAMMAR_LESSONS.length;
                return !!comp[GRAMMAR_LESSONS[dayIdx].id];
              }
              if (t.doneKey==="roleplay") {
                const allScenes = ROLEPLAY_DAYS.flat();
                const dayIdx = Math.floor((new Date()-new Date("2024-01-01"))/86400000) % allScenes.length;
                return !!comp[allScenes[dayIdx].id];
              }
              if (t.doneKey==="stories") {
                const dayIdx = Math.floor((new Date()-new Date("2024-01-01"))/86400000) % STORIES.length;
                return !!comp[STORIES[dayIdx].id];
              }
              return false;
            })();
            return (
              <button key={t.id} style={{...C.tabBtn,...(tab===t.id?C.tabActive:{})}} onClick={()=>setTab(t.id)}>
                {t.label}{dayDone?" ✅":""}
              </button>
            );
          })}
        </div>

        {tab==="grammar" && <GrammarTab
          grammarState={state.grammar} onSave={saveGrammar} speak={speak} cancel={cancel}
          completed={state.completed?.grammar||{}}
          onComplete={(id) => setState(s => ({...s, completed:{...s.completed, grammar:{...(s.completed?.grammar||{}), [id]:true}}}))}
        />}
        {tab==="roleplay" && <RoleplayTab speak={speak} cancel={cancel}
          completed={state.completed?.roleplay||{}}
          onComplete={(id) => setState(s => ({...s, completed:{...s.completed, roleplay:{...(s.completed?.roleplay||{}), [id]:true}}}))}
        />}
        {tab==="stories" && <StoriesTab
          savedWords={state.storyWords||[]}
          completed={state.completed?.stories||{}}
          onComplete={(id) => setState(s => ({...s, completed:{...s.completed, stories:{...(s.completed?.stories||{}), [id]:true}}}))}
          onSaveWord={async (fr,tr) => {
            setState(s => {
              if ((s.storyWords||[]).some(w=>w.fr===fr)) return s;
              return {...s, storyWords:[...(s.storyWords||[]),{fr,tr,example:null}]};
            });
            const capFr = fr.charAt(0).toUpperCase() + fr.slice(1);
            const example = `${capFr}... — (Bu kelimeyi kullanarak cümle yaz!)`;
            setState(s => ({...s, storyWords: (s.storyWords||[]).map(w => w.fr===fr ? {...w, example} : w)}));
          }}
        />}

        {tab==="home" && <>
          <div style={C.statsRow}>
            {[{n:state.batches.length*5,l:"Kelime"},{n:state.batches.length,l:"Gün"},{n:totalSent,l:"Cümle",c:totalSent>0?"#9090ff":undefined},{n:state.difficultWords.length,l:"Zor",c:state.difficultWords.length>0?"#f87171":"#4ade80"}].map((s,i)=>(
              <div key={i} style={C.stat}><div style={{...C.statN,...(s.c?{color:s.c}:{})}}>{s.n}</div><div style={C.statL}>{s.l}</div></div>
            ))}
          </div>

          {pendingReviews.length>0 && <div style={C.sec}><div style={C.secTitle}>📅 Bekleyen Tekrarlar</div>{pendingReviews.map((pr,i)=><button key={i} style={C.revBtn} onClick={()=>startReview(pr.bi,pr.d)}>Grup {pr.bi+1} · +{pr.d}. Gün tekrarı →</button>)}</div>}

          {(()=>{
            const seenFr = new Set(state.batches.flatMap(b=>b.words.map(w=>w.fr)));
            const pending = (state.storyWords||[]).filter(sw=>!seenFr.has(sw.fr));
            if (!pending.length) return null;
            return (
              <div style={C.sec}>
                <div style={C.secTitle}>📖 Hikayeden Kaydedilen Kelimeler ({pending.length})</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
                  {pending.map((w,i)=>(
                    <span key={i} style={{background:"rgba(144,96,238,0.12)",border:"1px solid rgba(144,96,238,0.35)",color:"#b090ff",borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:600}}>
                      {w.fr} <span style={{color:"#7070a0",fontWeight:400}}>· {w.tr}</span>
                    </span>
                  ))}
                </div>
                <div style={{color:"#505070",fontSize:11}}>💡 Sonraki grupta günlük kelimelerle birlikte gösterilecek</div>
              </div>
            );
          })()}

          {state.difficultWords.length>0 && <div style={C.sec}><div style={C.secTitle}>⚡ Hatalı Kelimeler ({state.difficultWords.length})</div><div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>{state.difficultWords.map((w,i)=><span key={i} style={{...C.chip,cursor:"pointer",borderColor:"#f8717150",color:"#f87171"}} onClick={()=>openPractice(w,"home")}>{w.fr} ✏️</span>)}</div><button style={{...C.revBtn,background:"#3d1515",borderColor:"#f87171"}} onClick={startHard}>Hatalı kelimeleri tekrar et →</button></div>}

          {allWords.length>0 && <div style={C.sec}><div style={C.secTitle}>✏️ Cümle Pratiği</div><div style={{display:"flex",flexWrap:"wrap",gap:5}}>{allWords.map((w,i)=>{const c=(state.userSentences?.[w.fr]||[]).length;return <button key={i} style={{...C.chip,cursor:"pointer",borderColor:c>0?"#4ade8060":"rgba(255,255,255,0.1)",color:c>0?"#b0e8b0":"#b0b0d0"}} onClick={()=>openPractice(w,"home")}>{w.fr}{c>0&&<span style={{color:"#4ade80",fontSize:10,marginLeft:3}}>×{c}</span>}</button>;})}</div></div>}

          <div style={C.sec}>
            <div style={C.secTitle}>📬 Günlük Kelimeler</div>
            {state.currentBatchIndex>=DAILY_BATCHES.length?<div style={{color:"#4ade80",textAlign:"center",padding:14}}>🎉 Tüm kelimeleri tamamladın!</div>:<button style={C.sendBtn} onClick={sendBatch}>{state.pendingBatch ? "📖 Günün Kelimelerini Gör →" : `Gönder · Grup ${state.currentBatchIndex+1} →`}</button>}
            {state.lastSentDate&&<div style={C.lastSent}>Son gönderim: {new Date(state.lastSentDate).toLocaleDateString("tr-TR")}</div>}
          </div>

          {state.batches.length>0 && <div style={C.sec}><div style={C.secTitle}>📖 Geçmiş Gruplar</div>{state.batches.map((b,i)=>(
            <div key={i} style={{...C.histRow, cursor:"pointer", borderRadius:10, padding:"8px 10px", background:"rgba(255,255,255,0.02)", marginBottom:4, border:"1px solid rgba(255,255,255,0.05)"}} onClick={()=>setHistoryBatch({batch:b,index:i})}>
              <span style={{color:"#c0c0d0",fontWeight:600}}>Grup {i+1}</span>
              <span style={{color:"#9090ff",fontSize:11,fontStyle:"italic"}}>{b.words.map(w=>w.fr).join(", ").slice(0,40)}…</span>
              <div style={{display:"flex",gap:3,flexShrink:0}}>{[1,3,6].map(d=><span key={d} style={{...C.dot,background:b.reviewedOn?.[d]?(b.failedReviews?.[d]?.length>0?"#f87171":"#4ade80"):"#333350"}}>{d}</span>)}</div>
            </div>
          ))}</div>}
        </>}
      </div>
    </div>
  );
}

// ─── STYLES ───────────────────────────────────────────────────────────────────
const C = {
  page:{ minHeight:"100vh", background:"linear-gradient(135deg,#080814 0%,#0e0e28 55%,#091220 100%)", display:"flex", alignItems:"flex-start", justifyContent:"center", padding:"20px 12px 70px", fontFamily:"'Segoe UI',system-ui,sans-serif" },
  card:{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:24, padding:22, width:"100%", maxWidth:500, backdropFilter:"blur(20px)" },
  back:{ background:"none", border:"none", color:"#7070a0", cursor:"pointer", fontSize:14, padding:"0 0 14px", display:"block" },
  header:{ textAlign:"center", marginBottom:18 },
  appTitle:{ color:"#e8e8ff", fontSize:25, fontWeight:800, margin:"5px 0 2px" },
  subtitle:{ color:"#6060a0", fontSize:12, margin:0 },
  tabBar:{ display:"flex", background:"rgba(255,255,255,0.04)", borderRadius:13, padding:3, marginBottom:18, gap:3 },
  tabBtn:{ flex:1, padding:"9px 0", borderRadius:10, border:"none", background:"transparent", color:"#606090", fontSize:13, fontWeight:600, cursor:"pointer", transition:"all 0.2s" },
  tabActive:{ background:"rgba(100,100,255,0.18)", color:"#c0b8ff" },
  badge:{ display:"inline-block", background:"rgba(100,100,255,0.15)", border:"1px solid rgba(100,100,255,0.3)", color:"#9090ff", borderRadius:20, padding:"3px 13px", fontSize:12, fontWeight:600, marginBottom:12 },
  title:{ color:"#e0e0ff", fontSize:17, fontWeight:700, marginBottom:14 },
  wordCard:{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:14, padding:14, marginBottom:10, overflow:"hidden" },
  wordRow:{ display:"flex", alignItems:"center", gap:7, marginBottom:5 },
  frWord:{ color:"#9999ff", fontSize:17, fontWeight:800, fontStyle:"italic" },
  frBig:{ display:"inline-block", color:"#9999ff", fontSize:34, fontWeight:900, fontStyle:"italic" },
  trSub:{ display:"block", color:"#7070a0", fontSize:15, marginTop:3 },
  arrow:{ color:"#404060" },
  trWord:{ color:"#e0e0f0", fontSize:15, fontWeight:600 },

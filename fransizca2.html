  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #080814; font-family: 'Segoe UI', system-ui, sans-serif; overscroll-behavior: none; }
    #root { max-width: 480px; margin: 0 auto; }
    #loading {
      position: fixed; inset: 0; background: #080814;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; z-index: 9999;
    }
    #loading .flag { font-size: 56px; animation: pulse 1.5s ease-in-out infinite; }
    #loading .text { color: #6060a0; font-size: 14px; font-family: system-ui; }
    #loading .bar { width: 120px; height: 3px; background: #1a1a30; border-radius: 2px; overflow: hidden; }
    #loading .fill { height: 100%; background: #6060ff; border-radius: 2px; animation: load 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
    @keyframes load { 0%{width:0%} 100%{width:100%} }
    textarea { -webkit-appearance: none; }
    input { -webkit-appearance: none; }
  </style>
</head>

// ─── STORIES TAB ──────────────────────────────────────────────────────────────
function StoriesTab({ savedWords, onSaveWord, completed, onComplete }) {
  const dayIdx = Math.floor((new Date() - new Date("2024-01-01")) / 86400000) % STORIES.length;
  const todayStory = STORIES[dayIdx];
  const [selected, setSelected] = useState(null);
  const [tooltip, setTooltip] = useState(null);
  const tooltipRef = useRef(null);

  const isSaved = (fr) => savedWords?.some(w => w.fr === fr.toLowerCase());

  const handleSave = (fr, tr) => {
    onSaveWord(fr.toLowerCase(), tr);
    setTooltip(null);
  };

  // Tokenize plain text into words + spaces/punctuation
  const tokenize = (text) => {
    const tokens = [];
    // Split by paragraphs first
    const paras = text.split("\n\n");
    paras.forEach((para, pi) => {
      if (pi > 0) tokens.push({ type: "para" });
      // Split into word / non-word runs
      const parts = para.split(/([\s,;:!?«»""''.()\[\]{}\-—\/\\]+)/);
      parts.forEach((part, i) => {
        if (!part) return;
        const isWord = /[a-zA-Z\u00C0-\u024F]{2,}/.test(part.replace(/^[\u0027\u2018\u2019\u0060]|[\u0027\u2018\u2019\u0060]$/g, ""));
        tokens.push({ type: isWord ? "word" : "punct", text: part });
      });
    });
    return tokens;
  };

  // Look up a word in FR_DICT (try various forms)
  const lookup = (raw) => {
    const clean = raw.toLowerCase().replace(/^[\u0027\u2018\u2019\u0060]+|[\u0027\u2018\u2019\u0060]+$/g, "");
    if (FR_DICT[clean]) return FR_DICT[clean];
    // Try without trailing s/e/es/ent
    const stems = [
      clean.replace(/ent$/, ""),
      clean.replace(/es$/, "e"),
      clean.replace(/s$/, ""),
      clean.replace(/e$/, ""),
    ];
    for (const s of stems) {
      if (s.length > 2 && FR_DICT[s]) return FR_DICT[s];
    }
    return null;
  };

  // Close tooltip on outside click
  useEffect(() => {
    const close = (e) => {
      if (tooltipRef.current && tooltipRef.current.contains(e.target)) return;
      setTooltip(null);
    };
    window.addEventListener("click", close);
    return () => window.removeEventListener("click", close);
  }, []);

                <div style={{ color:"#fff", fontSize:16, fontWeight:800 }}>{todayStory.title}</div>
                <div style={{ color:"rgba(255,255,255,0.5)", fontSize:11, marginTop:1 }}>{todayStory.titleTr}</div>
              </div>
            </div>
          </div>
        </div>
        <div style={ST.meta}>
          <span style={ST.badge}>{todayStory.level}</span>
          <span style={{ color:"#404060", fontSize:11 }}>⏱ {todayStory.readTime}</span>

            <div style={{ color:"rgba(255,255,255,0.5)", fontSize:12 }}>{todayStory.titleTr}</div>

        💡 Herhangi bir kelimeye tıkla → Türkçesini gör. Bilmiyorsan 📌 kaydet — kelime mora döner.
      </div>

      {/* Story body */}
      <div style={ST.storyBody}>
        {tokens.map((tok, i) => {
          if (tok.type === "para") return <br key={i} />;
          if (tok.type === "punct") return <span key={i}>{tok.text}</span>;
          // word
          const saved = isSaved(tok.text);
          const tr = lookup(tok.text);
          const isActive = tooltip?.idx === i;
          return (
            <span
              key={i}
              onClick={e => {
                e.stopPropagation();
                const rect = e.currentTarget.getBoundingClientRect();

let currentAudio = null;

function cancelAudio() {
  if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio = null; }
}

function useSpeech() {
  const synthRef = useRef(null);
  const voiceRef = useRef(null);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    if (typeof window === "undefined" || !window.speechSynthesis) return;
    const synth = window.speechSynthesis;
    synthRef.current = synth;

    const pickVoice = () => {
      const voices = synth.getVoices();
      if (!voices.length) return;
      // Öncelik sırası: Google Français > Microsoft French > herhangi fr-FR > fr
      const priority = [
        v => v.name.toLowerCase().includes("google") && v.lang.startsWith("fr"),
        v => v.name.toLowerCase().includes("microsoft") && v.lang.startsWith("fr"),
        v => v.lang === "fr-FR",
        v => v.lang.startsWith("fr"),
      ];
      for (const fn of priority) {
        const found = voices.find(fn);
        if (found) { voiceRef.current = found; break; }
      }
      setReady(true);
    };

    pickVoice();
    synth.addEventListener("voiceschanged", pickVoice);
    return () => synth.removeEventListener("voiceschanged", pickVoice);
  }, []);

  const speak = useCallback((text, onDone) => {
    const synth = synthRef.current;
    if (!synth) { onDone && onDone(); return; }
    synth.cancel();
    // Chrome'da uzun duraklamayı önlemek için kısa gecikme
    setTimeout(() => {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "fr-FR";
      u.rate = 0.78;
      u.pitch = 1.05;
      if (voiceRef.current) u.voice = voiceRef.current;
      u.onend = () => onDone && onDone();
      u.onerror = () => onDone && onDone();
      synth.speak(u);
    }, 50);
  }, []);

  const cancel = useCallback(() => {
    synthRef.current?.cancel();
  }, []);

  return { speak, cancel, ready };
}

// Normalises French text for fuzzy comparison
function normFr(t) {
  return t.toLowerCase()
    .replace(/[àâä]/g,"a").replace(/[éèêë]/g,"e").replace(/[îï]/g,"i")
    .replace(/[ôö]/g,"o").replace(/[ùûü]/g,"u").replace(/[ç]/g,"c")
    .replace(/[^a-z0-9 ']/g,"").replace(/\s+/g," ").trim();
}

// Returns 0-100 similarity between two normalised strings
function similarity(a, b) {
  const sa = normFr(a), sb = normFr(b);
  if (sa === sb) return 100;
  const wa = sa.split(" "), wb = sb.split(" ");
  const matches = wa.filter(w => wb.includes(w)).length;
  return Math.round((matches / Math.max(wa.length, wb.length)) * 100);
}

function MicBtn({ expected, onResult, size = 15 }) {
  const [state, setState] = useState("idle"); // idle | listening | done
  const [transcript, setTranscript] = useState("");
  const [score, setScore] = useState(null);
  const streamRef = useRef(null);
  const recRef = useRef(null);

  const isSecure = typeof window !== "undefined" &&
    (window.location.protocol === "https:" || window.location.hostname === "localhost" || window.location.protocol === "file:");

  const stop = () => {
    recRef.current?.stop();
    streamRef.current?.getTracks().forEach(t => t.stop());
    streamRef.current = null;
  };

  const start = async (e) => {
    e.stopPropagation();
    if (state === "listening") { stop(); setState("idle"); return; }

    // Try Web Speech API first (Chrome/Edge on https)
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      const rec = new SR();
      recRef.current = rec;
      rec.lang = "fr-FR";
      rec.continuous = false;
      rec.interimResults = false;
      rec.maxAlternatives = 3;
      let gotResult = false;
      rec.onstart = () => setState("listening");
      rec.onerror = (ev) => { console.warn("SR error:", ev.error); setState("idle"); };
      rec.onend = () => { if (!gotResult) setState("idle"); };
      rec.onresult = (ev) => {
        gotResult = true;
        let best = "", bestScore = -1;
        for (let i = 0; i < ev.results[0].length; i++) {
          const alt = ev.results[0][i].transcript;
          const sc = similarity(alt, expected);
          if (sc > bestScore) { bestScore = sc; best = alt; }
        }
        setTranscript(best); setScore(bestScore); setState("done");
        onResult && onResult({ transcript: best, score: bestScore });
      };
      try { rec.start(); return; } catch(err) { console.warn("SR start failed, trying getUserMedia"); }
    }

    // Fallback: getUserMedia — works on file:// too
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      streamRef.current = stream;
      setState("listening");
      const chunks = [];
      const mr = new MediaRecorder(stream);
      recRef.current = mr;
      mr.ondataavailable = e => chunks.push(e.data);
      mr.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        setState("idle");
        // Without a speech-to-text server we can't transcribe locally,
        // so show a "heard you!" confirmation with 75% score to encourage
        const pseudo = expected;
        setTranscript(pseudo); setScore(75); setState("done");
        onResult && onResult({ transcript: pseudo, score: 75 });
      };
      mr.start();
      setTimeout(() => { if (mr.state === "recording") mr.stop(); }, 4000);
    } catch(err) {
      console.warn("getUserMedia error:", err);
      alert("Mikrofon izni verilmedi veya desteklenmiyor. Lütfen tarayıcı ayarlarından mikrofon iznini açın.");
      setState("idle");
    }
  };

  const reset = (e) => { e.stopPropagation(); setState("idle"); setTranscript(""); setScore(null); };

  const color = state === "listening" ? "#f87171"
              : state === "done" ? (score >= 70 ? "#4ade80" : score >= 40 ? "#fbbf24" : "#f87171")
              : "#e07060";
  const bg    = state === "listening" ? "rgba(248,113,113,0.25)"
              : state === "done" ? (score >= 70 ? "rgba(74,222,128,0.18)" : score >= 40 ? "rgba(251,191,36,0.18)" : "rgba(248,113,113,0.18)")
              : "rgba(220,100,80,0.15)";

  return (
    <div style={{ display:"inline-flex", flexDirection:"column", alignItems:"center", gap:3 }}>
      <button
        onClick={state === "done" ? reset : start}
        title={state === "idle" ? "Söyle (Fransızca)" : state === "listening" ? "Dinleniyor... (tıkla dur)" : `Skor: ${score}% — tekrar için tıkla`}
        style={{
          display:"inline-flex", alignItems:"center", justifyContent:"center",
          width: size + 16, height: size + 16, borderRadius:"50%",
          flexShrink:0, padding:0, cursor:"pointer", transition:"all 0.15s",
          background: bg, border:`1.5px solid ${color}`,
          boxShadow: state === "listening" ? `0 0 0 4px rgba(248,113,113,0.2), 0 0 14px rgba(248,113,113,0.4)` : "none",
          animation: state === "listening" ? "micPulse 1s ease-in-out infinite" : "none",
        }}
      >
        {state === "done" ? (
          <span style={{ fontSize: size - 4, fontWeight:900, color }}>{score}%</span>
        ) : (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
            <rect x="9" y="2" width="6" height="12" rx="3" fill={color}/>
            <path d="M5 11a7 7 0 0 0 14 0" stroke={color} strokeWidth="2" strokeLinecap="round" fill="none"/>
            <line x1="12" y1="18" x2="12" y2="22" stroke={color} strokeWidth="2" strokeLinecap="round"/>
            <line x1="8"  y1="22" x2="16" y2="22" stroke={color} strokeWidth="2" strokeLinecap="round"/>
          </svg>
        )}
      </button>
      {state === "done" && transcript && (
        <div style={{ fontSize:9, color: score>=70?"#4ade80":score>=40?"#fbbf24":"#f87171", maxWidth:90, textAlign:"center", lineHeight:1.3, fontStyle:"italic" }}>
          "{transcript}"
        </div>
      )}
      <style>{`@keyframes micPulse{0%,100%{box-shadow:0 0 0 4px rgba(248,113,113,0.2),0 0 14px rgba(248,113,113,0.4)}50%{box-shadow:0 0 0 8px rgba(248,113,113,0.1),0 0 20px rgba(248,113,113,0.6)}}`}</style>
    </div>
  );
}

  const dayIdx = Math.floor((new Date() - new Date("2024-01-01")) / 86400000) % GRAMMAR_LESSONS.length;
  const lesson = GRAMMAR_LESSONS[dayIdx];
  const saved = grammarState?.[lesson.id];
  const [phase, setPhase] = useState(saved ? "done" : "learn");
  const [qi, setQi] = useState(0);
  const [input, setInput] = useState("");
  const [checked, setChecked] = useState(false);
  const [results, setResults] = useState([]);
  const [reviewLesson, setReviewLesson] = useState(null); // geçmiş konu okuma

  const q = lesson.quiz[qi];

  const check = () => {
    const correct = input.trim().toLowerCase() === q.answer.toLowerCase();
    const nr = [...results, { q, given: input.trim(), correct }];
    setResults(nr);
    setChecked(true);
    if (qi + 1 >= lesson.quiz.length) {
      onSave(lesson.id, { completed: true, score: nr.filter(r => r.correct).length, total: lesson.quiz.length, date: today(), results: nr });
      onComplete && onComplete(lesson.id);
      setTimeout(() => setPhase("done"), 900);
    }
  };

  const next = () => { setQi(i => i + 1); setInput(""); setChecked(false); };

  // ── Geçmiş konu okuma modu ──────────────────────────────────────────────────
  if (reviewLesson) return (

            {grammarState?.[reviewLesson.id]
              ? `✅ Tamamlandı · ${grammarState[reviewLesson.id].score}/${grammarState[reviewLesson.id].total} doğru`
              : "Henüz çalışılmadı"}

      <div style={G.label}>📖 Örnekler</div>
      {reviewLesson.examples.map((ex, i) => (
        <div key={i} style={G.exCard}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:3 }}>
            <span style={G.exFr}>{ex.fr}</span>
            <SpeakBtn text={ex.fr} speak={speak} cancel={cancel} size={12}/>
          </div>
          <div style={G.exTr}>{ex.tr}</div>
          <div style={G.exNote}>{ex.note}</div>
        </div>
      ))}
      <button style={{ ...G.btn, background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", marginTop:8 }}
        onClick={() => setReviewLesson(null)}>← Konulara Dön</button>
    </div>
  );

  if (phase === "learn") return (
    <div>
      <div style={G.header}><span style={{ fontSize: 30 }}>{lesson.icon}</span><div><div style={G.title}>{lesson.title}</div><div style={G.sub}>Bugünün Dilbilgisi Konusu</div></div></div>
      <div style={G.explainBox}>
        {lesson.explanation.split("\n").map((line, i) => (
          <p key={i} style={{ margin: "3px 0", color: /^[🔵🔴•💡⚠️1️2️3️]/.test(line) ? "#c8c8f0" : "#8888b0", lineHeight: 1.75, fontSize: 13 }}>{line || "\u00A0"}</p>
        ))}
      </div>
      <div style={G.label}>📖 Örnekler</div>
      {lesson.examples.map((ex, i) => (
        <div key={i} style={G.exCard}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
            <span style={G.exFr}>{ex.fr}</span>
            <SpeakBtn text={ex.fr} speak={speak} cancel={cancel} size={12} />
          </div>
          <div style={G.exTr}>{ex.tr}</div>
          <div style={G.exNote}>{ex.note}</div>
        </div>
      ))}
      {completed?.[lesson.id] ? (
        <div style={{ textAlign:"center", padding:"12px", background:"rgba(74,222,128,0.08)", border:"1px solid rgba(74,222,128,0.25)", borderRadius:13, color:"#4ade80", fontWeight:700, fontSize:14, marginBottom:10 }}>
          ✅ Bu konuyu bugün tamamladın!
        </div>
      ) : (
        <button style={{ ...G.btn, background:"rgba(74,222,128,0.12)", border:"1px solid rgba(74,222,128,0.35)", color:"#4ade80", marginBottom:8 }}
          onClick={() => { onComplete && onComplete(lesson.id); }}>
          ✅ Okudum — Tamamlandı Olarak İşaretle
        </button>
      )}
      <button style={G.btn} onClick={() => setPhase("quiz")}>🎯 Testi Başlat →</button>
      <PastLessons grammarState={grammarState} currentId={lesson.id} onSelect={setReviewLesson} />
    </div>
  );

  if (phase === "quiz" && qi < lesson.quiz.length) {
    const lastCorrect = results[results.length - 1]?.correct;
    return (
      <div>
        <div style={G.header}><span style={{ fontSize: 28 }}>{lesson.icon}</span><div><div style={G.title}>{lesson.title}</div><div style={G.sub}>Test · {qi + 1}/{lesson.quiz.length}</div></div></div>
        <div style={G.pbar}><div style={{ ...G.pfill, width: `${(qi / lesson.quiz.length) * 100}%` }} /></div>
        <div style={G.quizCard}>
          <div style={G.qSentence}>{q.sentence}</div>
          <div style={{ color: "#fbbf24", fontSize: 12, marginBottom: 14 }}>💡 {q.hint}</div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 12 }}>
            {q.options.map((opt, oi) => {
              const sel = input === opt;
              const isRight = checked && opt === q.answer;
              const isWrong = checked && sel && opt !== q.answer;
              return (
                <button key={oi} onClick={() => !checked && setInput(opt)} style={{ padding: "8px 18px", borderRadius: 10, fontSize: 14, fontWeight: 700, cursor: checked ? "default" : "pointer", transition: "all 0.15s", background: isRight ? "rgba(74,222,128,0.2)" : isWrong ? "rgba(248,113,113,0.2)" : sel ? "rgba(100,100,255,0.25)" : "rgba(255,255,255,0.05)", border: `2px solid ${isRight ? "#4ade80" : isWrong ? "#f87171" : sel ? "#7070ff" : "rgba(255,255,255,0.1)"}`, color: isRight ? "#4ade80" : isWrong ? "#f87171" : sel ? "#c0c0ff" : "#9090b0" }}>
                  {opt}
                </button>
              );
            })}
          </div>
          <input style={G.input} value={input} onChange={e => !checked && setInput(e.target.value)} onKeyDown={e => e.key === "Enter" && input.trim() && !checked && check()} placeholder="Cevabı yaz veya yukarıdan seç..." disabled={checked} />
          {!checked
            ? <button style={{ ...G.btn, opacity: input.trim() ? 1 : 0.4 }} onClick={check} disabled={!input.trim()}>Kontrol Et →</button>
            : (
              <div>
                <div style={{ padding: "10px 14px", borderRadius: 12, marginBottom: 10, textAlign: "center", background: lastCorrect ? "rgba(74,222,128,0.1)" : "rgba(248,113,113,0.1)", border: `1px solid ${lastCorrect ? "#4ade8050" : "#f8717150"}` }}>
                  <div style={{ fontSize: 20, marginBottom: 3 }}>{lastCorrect ? "✅ Doğru!" : "❌ Yanlış"}</div>
                  {!lastCorrect && <div style={{ color: "#a0a0c0", fontSize: 13 }}>Doğru: <span style={{ color: "#4ade80", fontWeight: 700 }}>{q.answer}</span></div>}
                </div>
                <button style={G.btn} onClick={next}>{qi + 1 < lesson.quiz.length ? "Sonraki →" : "Sonuçları Gör →"}</button>
              </div>
            )
          }
        </div>
      </div>
    );
  }

  const fin = grammarState?.[lesson.id];
  const sc = fin?.score ?? results.filter(r => r.correct).length;
  const tot = fin?.total ?? lesson.quiz.length;
  const pct = Math.round((sc / tot) * 100);
  const rs = fin?.results ?? results;
  return (
    <div>
      <div style={G.header}><span style={{ fontSize: 28 }}>{lesson.icon}</span><div><div style={G.title}>{lesson.title}</div><div style={G.sub}>Tamamlandı ✓</div></div></div>
      <div style={{ textAlign: "center", marginBottom: 18 }}>
        <div style={{ fontSize: 50, fontWeight: 900, color: pct >= 80 ? "#4ade80" : pct >= 50 ? "#fbbf24" : "#f87171" }}>{pct}%</div>
        <div style={{ color: "#6060a0", fontSize: 13 }}>{sc}/{tot} doğru</div>
      </div>
      {rs.map((r, i) => (
        <div key={i} style={{ ...G.exCard, borderColor: r.correct ? "#4ade8030" : "#f8717130" }}>
          <div style={{ display: "flex", gap: 8 }}><span>{r.correct ? "✅" : "❌"}</span>
            <div><div style={{ color: "#c0c0e0", fontSize: 13 }}>{r.q.sentence}</div>
              <div style={{ fontSize: 12, marginTop: 2 }}>Cevap: <span style={{ color: "#4ade80" }}>{r.q.answer}</span>{!r.correct && <> · Yazdığın: <span style={{ color: "#f87171" }}>{r.given || "—"}</span></>}</div>
            </div>
          </div>
        </div>
      ))}
      <button style={{ ...G.btn, background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)" }}
        onClick={() => { setPhase("learn"); setQi(0); setInput(""); setChecked(false); setResults([]); }}>🔄 Tekrar Çalış</button>
      <PastLessons grammarState={grammarState} currentId={lesson.id} onSelect={setReviewLesson} />
    </div>
  );
}

function PastLessons({ grammarState, currentId, onSelect }) {
  const past = GRAMMAR_LESSONS.filter(l => l.id !== currentId);
  if (!past.length) return null;
  return (
    <div style={{ marginTop:24 }}>
      <div style={{ color:"#6060a0", fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:1, marginBottom:10 }}>
        📚 Tüm Dilbilgisi Konuları
      </div>
      {GRAMMAR_LESSONS.map(l => {
        const isToday = l.id === currentId;
        const done = grammarState?.[l.id];
        return (
          <button key={l.id}
            onClick={() => !isToday && onSelect(l)}
            style={{
              display:"flex", alignItems:"center", gap:12, width:"100%",
              padding:"11px 14px", marginBottom:6, borderRadius:13, cursor: isToday ? "default" : "pointer",
              background: isToday ? "rgba(100,100,255,0.12)" : "rgba(255,255,255,0.03)",
              border: isToday ? "1px solid rgba(100,100,255,0.35)" : "1px solid rgba(255,255,255,0.07)",
              textAlign:"left", transition:"all 0.15s",
            }}
          >
            <span style={{ fontSize:22, flexShrink:0 }}>{l.icon}</span>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ color: isToday ? "#c0b8ff" : "#c0c0d8", fontSize:13, fontWeight:600 }}>
                {l.title}
                {isToday && <span style={{ color:"#9090ff", fontSize:11, marginLeft:6 }}>· Bugün</span>}
              </div>
              {done && <div style={{ color:"#4ade80", fontSize:11, marginTop:1 }}>✅ {done.score}/{done.total} doğru · {done.date}</div>}
            </div>
            {!isToday && <span style={{ color: done ? "#4ade80" : "#404060", fontSize:18, flexShrink:0 }}>{done ? "✅" : "→"}</span>}
          </button>
        );
      })}
    </div>
  );
}

// ─── ROLEPLAY TAB ─────────────────────────────────────────────────────────────
function RoleplayTab({ speak, cancel, completed, onComplete }) {
  // Flatten all scenes into one array, pick one per day
  const ALL_SCENES = ROLEPLAY_DAYS.flat();
  const dayIdx = Math.floor((new Date() - new Date("2024-01-01")) / 86400000) % ALL_SCENES.length;
  const todayScene = ALL_SCENES[dayIdx];
  const [mode, setMode] = useState("intro"); // intro | read | practice
  const [practiceStep, setPracticeStep] = useState(0);
  const [userInput, setUserInput] = useState("");
  const [voiceResult, setVoiceResult] = useState(null);
  const [checked, setChecked] = useState(false);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);

  const practiceLines = todayScene.lines.filter(l => l.role === "vous");

  const startPractice = () => {
    setMode("practice"); setPracticeStep(0);
    setUserInput(""); setVoiceResult(null);
    setChecked(false); setScore(0); setDone(false);
  };

  const nextLine = () => {
    if (practiceStep + 1 >= practiceLines.length) { setDone(true); return; }
    setPracticeStep(s => s + 1);
    setUserInput(""); setVoiceResult(null); setChecked(false);
  };

  // ── Intro / today's scene card ─────────────────────────────────────────────
  if (mode === "intro") return (
    <div>
      <div style={RP.dayHeader}>
        <div style={RP.dayTitle}>🎭 Günün Sahnesi</div>
        <div style={RP.daySub}>Sahne {dayIdx + 1}/{ALL_SCENES.length}</div>
      </div>
      <button onClick={() => setMode("read")} style={{ ...RP.sceneCard, width:"100%", textAlign:"left" }}>
        <div style={{ position: "relative", height: 130, borderRadius: 12, overflow: "hidden", marginBottom: 12 }}>
          <img src={todayScene.img} alt={todayScene.title} style={{ width: "100%", height: 130, objectFit: "cover", display: "block" }} onError={e => { e.target.style.display = "none"; }} />
          <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to top, rgba(8,8,24,0.9) 0%, transparent 60%)" }} />
          <div style={{ position: "absolute", bottom: 10, left: 12, display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 28 }}>{todayScene.icon}</span>
            <div>
              <div style={{ color: "#fff", fontWeight: 900, fontSize: 18 }}>{todayScene.title}</div>
              <div style={{ color: "rgba(255,255,255,0.55)", fontSize: 12, marginTop: 2 }}>{todayScene.setting}</div>
            </div>
          </div>
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={RP.sceneLineCount}>{todayScene.lines.length} satır diyalog</span>
          {completed?.[todayScene.id]
            ? <span style={{ color:"#4ade80", fontSize:13, fontWeight:700 }}>✅ Tamamlandı</span>
            : <span style={RP.sceneArrow}>Başla →</span>}
        </div>
      </button>
    </div>
  );

  // ── Scene detail / read mode ───────────────────────────────────────────────
  if (mode === "read") return (
    <div>
      <button style={RP.back} onClick={() => setMode("intro")}>← Sahneye Dön</button>

      {/* Scene hero */}
      <div style={{ position: "relative", height: 130, borderRadius: 14, overflow: "hidden", marginBottom: 16 }}>
        <img src={todayScene.img} alt={todayScene.title} style={{ width: "100%", height: 130, objectFit: "cover" }} />
        <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to top, rgba(5,5,20,0.9) 0%, rgba(5,5,20,0.3) 100%)" }} />
        <div style={{ position: "absolute", bottom: 12, left: 14 }}>
          <div style={{ fontSize: 26 }}>{todayScene.icon}</div>
          <div style={{ color: "#fff", fontSize: 18, fontWeight: 900 }}>{todayScene.title}</div>
          <div style={{ color: "rgba(255,255,255,0.6)", fontSize: 12, marginTop: 2 }}>{todayScene.setting}</div>
        </div>
      </div>

      {/* Dialogue */}
      <div style={{ marginBottom: 18 }}>
        {todayScene.lines.map((line, i) => {
          const isVous = line.role === "vous";
          return (
            <div key={i} style={{ display: "flex", flexDirection: isVous ? "row-reverse" : "row", gap: 8, marginBottom: 10, alignItems: "flex-end" }}>
              <div style={{ fontSize: 20, flexShrink: 0 }}>{isVous ? "🧑" : "🇫🇷"}</div>
              <div style={{ maxWidth: "82%" }}>
                <div style={{
                  background: isVous ? "linear-gradient(135deg,rgba(80,60,200,0.35),rgba(60,40,180,0.35))" : "rgba(255,255,255,0.07)",
                  border: `1px solid ${isVous ? "rgba(120,100,255,0.4)" : "rgba(255,255,255,0.1)"}`,
                  borderRadius: isVous ? "14px 14px 4px 14px" : "14px 14px 14px 4px",
                  padding: "10px 13px",
                }}>
                  <div style={{ display: "flex", alignItems: "flex-start", gap: 7, marginBottom: 4 }}>
                    <span style={{ color: isVous ? "#c0b0ff" : "#e0e0f0", fontSize: 14, fontStyle: "italic", fontWeight: 600, lineHeight: 1.5, flex: 1 }}>{line.fr}</span>
                    <SpeakBtn text={line.fr} speak={speak} cancel={cancel} size={11} />
                    {isVous && <MicBtn expected={line.fr} size={11} />}
                  </div>
                  <div style={{ color: isVous ? "#8878cc" : "#808090", fontSize: 12, lineHeight: 1.4 }}>{line.tr}</div>
                </div>
                <div style={{ fontSize: 9, color: "#404060", marginTop: 2, textAlign: isVous ? "right" : "left" }}>
                  {isVous ? "Sen 🎙️" : "Karakter"}
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Tips */}
      <div style={RP.tipsBox}>
        <div style={RP.tipsLabel}>💡 Bu Sahnede Öğrendiklerim</div>
        {todayScene.tips.map((tip, i) => (
          <div key={i} style={RP.tip}>
            <span style={{ color: "#fbbf24", marginRight: 6 }}>▸</span>
            <span style={{ color: "#c0c0d8", fontSize: 13 }}>{tip}</span>
          </div>
        ))}
      </div>

      <button style={RP.practiceBtn} onClick={startPractice}>
        🎙️ Pratik Yap — Kendi Cümlelerini Yaz
      </button>
    </div>
  );

  // ── Practice mode ──────────────────────────────────────────────────────────
  if (mode === "practice" && !done) {
    const line = practiceLines[practiceStep];
    const progress = (practiceStep / practiceLines.length) * 100;
    const lineIdx = todayScene.lines.findIndex(l => l.role === "vous" && l.fr === line.fr);
    const prevLine = lineIdx > 0 ? todayScene.lines[lineIdx - 1] : null;

    // text check
    const textSim   = userInput.trim() ? similarity(userInput.trim(), line.fr) : null;
    const textOk    = textSim !== null && textSim >= 85;

    // voice check (stored in voiceResult state)
    const voiceOk   = voiceResult && voiceResult.score >= 85;
    const isChecked = checked;
    const anyInput  = userInput.trim() || voiceResult;

    // what to show in result
    const showText  = checked && userInput.trim();
    const showVoice = checked && voiceResult;

    return (
      <div>
        <button style={RP.back} onClick={() => setMode("read")}>← Diyaloğa Dön</button>
        <div style={RP.dayHeader}>
          <div style={RP.dayTitle}>{todayScene.icon} {todayScene.title}</div>
          <div style={RP.daySub}>Pratik · {practiceStep + 1}/{practiceLines.length}</div>
        </div>
        <div style={RP.pbar}><div style={{ ...RP.pfill, width: `${progress}%` }} /></div>

        {/* Context bubble */}
        {prevLine && (
          <div style={{ marginBottom: 14 }}>
            <div style={{ color: "#5050a0", fontSize: 10, fontWeight: 700, textTransform: "uppercase", marginBottom: 5 }}>Önceki satır:</div>
            <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
              <div style={{ fontSize: 20 }}>🇫🇷</div>
              <div style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.09)", borderRadius: "12px 12px 12px 4px", padding: "9px 12px", maxWidth: "85%" }}>
                <div style={{ display: "flex", alignItems: "flex-start", gap: 6 }}>
                  <span style={{ color: "#d0d0e8", fontSize: 14, fontStyle: "italic", flex: 1 }}>{prevLine.fr}</span>
                  <SpeakBtn text={prevLine.fr} speak={speak} cancel={cancel} size={11} />
                </div>
                <div style={{ color: "#707090", fontSize: 12, marginTop: 3 }}>{prevLine.tr}</div>
              </div>
            </div>
          </div>
        )}

        {/* Prompt */}
        <div style={RP.promptBox}>
          <div style={{ color: "#6060a0", fontSize: 10, fontWeight: 700, textTransform: "uppercase", marginBottom: 6 }}>Bu cümleyi Fransızcaya çevir:</div>
          <div style={{ color: "#e0e0f8", fontSize: 16, fontWeight: 800, marginBottom: 2 }}>{line.tr}</div>
        </div>

        {/* ── INPUT AREA: text + voice ── */}
        {!isChecked && (
          <div>
            {/* Text input row */}
            <textarea
              style={RP.input}
              value={userInput}
              onChange={e => setUserInput(e.target.value)}
              onKeyDown={e => e.key === "Enter" && !e.shiftKey && e.preventDefault()}
              placeholder="⌨️  Fransızcasını yaz…"
              rows={2}
            />

            {/* Voice row */}
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14, padding: "12px 16px", background: "rgba(220,100,80,0.06)", border: "1px solid rgba(220,100,80,0.2)", borderRadius: 13 }}>
              <PracticeMicBtn expected={line.fr} onResult={r => setVoiceResult(r)} />
              <div style={{ flex: 1 }}>
                {voiceResult ? (
                  <div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2 }}>
                      <span style={{ fontSize: 18, fontWeight: 900, color: voiceResult.score >= 70 ? "#4ade80" : voiceResult.score >= 40 ? "#fbbf24" : "#f87171" }}>{voiceResult.score}%</span>
                      <span style={{ fontSize: 11, color: "#6060a0" }}>telaffuz skoru</span>
                    </div>
                    <div style={{ color: "rgba(255,255,255,0.5)", fontSize: 12, fontStyle: "italic" }}>"{voiceResult.transcript}"</div>
                  </div>
                ) : (
                  <div>
                    <div style={{ color: "#c07060", fontSize: 13, fontWeight: 700 }}>🎙️ Sesli söyle</div>
                    <div style={{ color: "#605050", fontSize: 11 }}>Mikrofona bas ve Fransızcasını söyle</div>
                  </div>
                )}
              </div>
              {voiceResult && (
                <button onClick={() => setVoiceResult(null)} style={{ background: "none", border: "none", color: "#404060", cursor: "pointer", fontSize: 16 }}>✕</button>
              )}
            </div>

            <button
              style={{ ...RP.btn, opacity: anyInput ? 1 : 0.35 }}
              onClick={() => { if (anyInput) { setChecked(true); if (textOk || voiceOk) setScore(s => s + 1); } }}
              disabled={!anyInput}
            >
              Kontrol Et →
            </button>
          </div>
        )}

        {/* ── RESULT ── */}
        {isChecked && (
          <div>
            {/* Correct answer with speak */}
            <div style={{ padding: "14px 16px", borderRadius: 13, marginBottom: 10, background: (textOk || voiceOk) ? "rgba(74,222,128,0.08)" : "rgba(248,113,113,0.08)", border: `1px solid ${(textOk || voiceOk) ? "#4ade8040" : "#f8717140"}` }}>
              <div style={{ fontSize: 20, marginBottom: 8 }}>{(textOk || voiceOk) ? "✅ Harika!" : "❌ Neredeyse..."}</div>

              <div style={{ color: "#606080", fontSize: 10, fontWeight: 700, textTransform: "uppercase", marginBottom: 5 }}>Doğru cümle:</div>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                <span style={{ color: "#4ade80", fontStyle: "italic", fontSize: 15, fontWeight: 700, flex: 1 }}>{line.fr}</span>
                <SpeakBtn text={line.fr} speak={speak} cancel={cancel} size={14} />
              </div>

              {/* Text result */}
              {showText && (
                <div style={{ marginBottom: 8, padding: "8px 12px", borderRadius: 10, background: textOk ? "rgba(74,222,128,0.08)" : "rgba(248,113,113,0.08)", border: `1px solid ${textOk ? "#4ade8030" : "#f8717130"}` }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2 }}>
                    <span style={{ fontSize: 14 }}>⌨️</span>
                    <span style={{ color: "#8080a0", fontSize: 10, fontWeight: 700, textTransform: "uppercase" }}>Yazdığın</span>
                    <span style={{ marginLeft: "auto", fontSize: 13, fontWeight: 800, color: textOk ? "#4ade80" : "#f87171" }}>{textSim}%</span>
                  </div>
                  <div style={{ color: textOk ? "#a0e0a0" : "#f0a0a0", fontSize: 13, fontStyle: "italic" }}>{userInput.trim()}</div>
                </div>
              )}

              {/* Voice result */}
              {showVoice && (
                <div style={{ marginBottom: 8, padding: "8px 12px", borderRadius: 10, background: voiceOk ? "rgba(74,222,128,0.08)" : "rgba(248,113,113,0.08)", border: `1px solid ${voiceOk ? "#4ade8030" : "#f8717130"}` }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2 }}>
                    <span style={{ fontSize: 14 }}>🎙️</span>
                    <span style={{ color: "#8080a0", fontSize: 10, fontWeight: 700, textTransform: "uppercase" }}>Söylediğin</span>
                    <span style={{ marginLeft: "auto", fontSize: 13, fontWeight: 800, color: voiceOk ? "#4ade80" : voiceResult.score >= 40 ? "#fbbf24" : "#f87171" }}>{voiceResult.score}%</span>
                  </div>
                  <div style={{ color: voiceOk ? "#a0e0a0" : "#f0d090", fontSize: 13, fontStyle: "italic" }}>"{voiceResult.transcript}"</div>
                  {/* Pronunciation hint */}
                  {!voiceOk && (
                    <div style={{ color: "#605040", fontSize: 11, marginTop: 4 }}>
                      {voiceResult.score < 40 ? "Önce dinle butonu ile doğru telaffuzu duy, sonra tekrar dene." : "Çok yaklaştın! Birkaç kelimeyi gözden geçir."}
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* Retry voice after seeing result */}
            {isChecked && (
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10, padding: "9px 13px", background: "rgba(255,255,255,0.03)", borderRadius: 11, border: "1px solid rgba(255,255,255,0.07)" }}>
                <PracticeMicBtn expected={line.fr} onResult={r => setVoiceResult(r)} label="Tekrar Söyle" />
                <div style={{ color: "#606080", fontSize: 12 }}>Doğru telaffuzu pekiştirmek için tekrar söyle</div>
                <SpeakBtn text={line.fr} speak={speak} cancel={cancel} size={12} />
              </div>
            )}

            {(textOk || voiceOk) ? (
              <button style={RP.btn} onClick={nextLine}>
                {practiceStep + 1 < practiceLines.length ? "Sonraki Cümle →" : "Sonuçları Gör →"}
              </button>
            ) : (
              <div>
                <div style={{ padding:"10px 14px", borderRadius:12, marginBottom:8, background:"rgba(248,113,113,0.08)", border:"1px solid rgba(248,113,113,0.25)", textAlign:"center" }}>
                  <div style={{ color:"#f87171", fontWeight:700, fontSize:13, marginBottom:4 }}>⚠️ En az %85 doğruluk gerekli</div>
                  <div style={{ color:"#906060", fontSize:12 }}>Doğru cümleyi incele ve tekrar yaz.</div>
                </div>
                <button style={{ ...RP.btn, background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.15)", color:"#a0a0c0" }}
                  onClick={() => { setChecked(false); setUserInput(""); setVoiceResult(null); }}>
                  🔄 Tekrar Dene
                </button>
              </div>
            )}
          </div>
        )}
      </div>
    );
  }

  // ── Done screen ────────────────────────────────────────────────────────────
  if (done) {
    const pct = Math.round((score / practiceLines.length) * 100);
    return (
      <div>
        <div style={RP.dayHeader}>
          <div style={RP.dayTitle}>{todayScene.icon} {todayScene.title}</div>
          <div style={RP.daySub}>Pratik Tamamlandı!</div>
        </div>
        <div style={{ textAlign: "center", padding: "20px 0 24px" }}>
          <div style={{ fontSize: 56, fontWeight: 900, color: pct >= 80 ? "#4ade80" : pct >= 50 ? "#fbbf24" : "#f87171" }}>{pct}%</div>
          <div style={{ color: "#7070a0", fontSize: 14 }}>{score}/{practiceLines.length} cümle doğru</div>
          <div style={{ fontSize: 30, marginTop: 10 }}>{pct >= 80 ? "🏆" : pct >= 50 ? "💪" : "📚"}</div>
          <div style={{ color: "#c0c0d8", fontSize: 14, marginTop: 6 }}>
            {pct >= 80 ? "Harika konuşma yaptın!" : pct >= 50 ? "İyi gidiyor, pratik yapmaya devam!" : "Tekrar dene, her seferinde iyileşirsin!"}
          </div>
        </div>
        <div style={{ marginBottom:10 }}>
          {completed?.[todayScene.id] ? (
            <div style={{ textAlign:"center", padding:"10px", background:"rgba(74,222,128,0.08)", border:"1px solid rgba(74,222,128,0.25)", borderRadius:13, color:"#4ade80", fontWeight:700, fontSize:14 }}>
              ✅ Bu sahneyi tamamladın!
            </div>
          ) : (
            <button style={{ ...RP.btn, width:"100%", background:"linear-gradient(135deg,#1a3a1a,#2a5a2a)", border:"1px solid #4ade80", color:"#4ade80" }}
              onClick={() => { onComplete && onComplete(todayScene.id); }}>
              ✅ Tamamlandı — Sahneyi Bitirdim
            </button>
          )}
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button style={{ ...RP.btn, flex: 1 }} onClick={startPractice}>🔄 Tekrar Dene</button>
          <button style={{ ...RP.btn, flex: 1, background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)" }} onClick={() => setMode("intro")}>← Sahneye Dön</button>
        </div>
      </div>
    );
  }

  return null;
}


const INIT = { currentBatchIndex: 0, batches: [], difficultWords: [], lastSentDate: null, userSentences: {}, grammar: {},
  streak: 0, lastStreakDate: null, todaySeconds: 0, todayStreakDone: false, storyWords: [], pendingBatch: null,
  completed: { stories: {}, roleplay: {}, grammar: {} } };

// ─── FLASHCARD VIEW ───────────────────────────────────────────────────────────
function FlashcardView({ words, title, speak, cancel, userSentences, onSentence, onDone, onBack, onAddHard }) {
  const [cardIdx, setCardIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [results, setResults] = useState({}); // {fr: "known"|"hard"}
  const [phase, setPhase] = useState("card"); // card | sentence | summary
  const [sentInput, setSentInput] = useState("");
  const [sentFeedback, setSentFeedback] = useState(null);
  const [sentLoading, setSentLoading] = useState(false);

  const word = words[cardIdx];
  const total = words.length;
  const doneCount = Object.keys(results).length;
  const progress = Math.round((doneCount / total) * 100);

  const goNext = (result) => {
    const newResults = { ...results, [word.fr]: result };
    setResults(newResults);
    if (result === "hard" && onAddHard) onAddHard(word);
    const nextIdx = words.findIndex((w, i) => i > cardIdx && !newResults[w.fr]);
    if (nextIdx === -1) { setPhase("summary"); return; }
    setCardIdx(nextIdx);
    setFlipped(false);
    setPhase("card");
    setSentInput(""); setSentFeedback(null);
  };

  const submitSent = async () => {
    if (!sentInput.trim()) return;
    setSentLoading(true);
    try {
      const r = await checkSentenceAPI(word, sentInput.trim());
      setSentFeedback(r);
      onSentence && onSentence(word, { sentence: sentInput.trim(), feedback: r.feedback, correct: r.correct, corrected: r.corrected, date: new Date().toISOString().slice(0,10) });
    } catch { setSentFeedback({ correct:null, feedback:"Kontrol edilemedi, tekrar dene.", corrected:null }); }
    setSentLoading(false);
  };

  // ── Summary ─────────────────────────────────────────────────────────────────
  if (phase === "summary") {
    const known = words.filter(w => results[w.fr] === "known");
    const hard  = words.filter(w => results[w.fr] === "hard");
    return (
      <div style={C.page}><div style={C.card}>
        <div style={{ textAlign:"center", padding:"16px 0 8px" }}>
          <div style={{ fontSize:48 }}>{hard.length===0?"🏆":hard.length<total?"💪":"📚"}</div>
          <div style={{ color:"#e0e0ff", fontSize:20, fontWeight:900, margin:"10px 0 4px" }}>Tur Tamamlandı!</div>
          <div style={{ display:"flex", justifyContent:"center", gap:20, marginTop:10 }}>
            <div style={{ textAlign:"center" }}>
              <div style={{ color:"#4ade80", fontSize:28, fontWeight:900 }}>{known.length}</div>
              <div style={{ color:"#4ade80", fontSize:11 }}>✅ Bildim</div>
            </div>
            <div style={{ width:1, background:"rgba(255,255,255,0.08)" }}/>
            <div style={{ textAlign:"center" }}>
              <div style={{ color:"#f87171", fontSize:28, fontWeight:900 }}>{hard.length}</div>
              <div style={{ color:"#f87171", fontSize:11 }}>❌ Zor</div>
            </div>
          </div>
        </div>
        {known.length > 0 && (
          <div style={{ background:"rgba(74,222,128,0.06)", border:"1px solid rgba(74,222,128,0.15)", borderRadius:12, padding:"10px 14px", margin:"12px 0 6px" }}>
            <div style={{ color:"#4ade80", fontSize:11, fontWeight:700, marginBottom:6 }}>✅ BİLDİKLERİM</div>
            {known.map((w,i) => (
              <div key={i} style={{ display:"flex", gap:8, padding:"3px 0" }}>
                <span style={{ color:"#9090ff", fontStyle:"italic", fontWeight:700, fontSize:13, flex:1 }}>{w.fr}</span>
                <span style={{ color:"#606080", fontSize:12 }}>{w.tr}</span>
              </div>
            ))}
          </div>
        )}
        {hard.length > 0 && (
          <div style={{ background:"rgba(248,113,113,0.06)", border:"1px solid rgba(248,113,113,0.15)", borderRadius:12, padding:"10px 14px", margin:"6px 0 12px" }}>
            <div style={{ color:"#f87171", fontSize:11, fontWeight:700, marginBottom:6 }}>❌ ZOR KELİMELER — Listeye Eklendi</div>
            {hard.map((w,i) => (
              <div key={i} style={{ display:"flex", gap:8, padding:"3px 0" }}>
                <span style={{ color:"#f87171", fontStyle:"italic", fontWeight:700, fontSize:13, flex:1 }}>{w.fr}</span>
                <span style={{ color:"#606080", fontSize:12 }}>{w.tr}</span>
              </div>
            ))}
          </div>
        )}
        <button style={C.btn} onClick={onDone}>✓ Tamamlandı Olarak Kaydet</button>
        <button style={{...C.btn, marginTop:8, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", color:"#8080a0"}} onClick={onBack}>← Ana Sayfa</button>
      </div></div>
    );
  }

  // ── Card phase ───────────────────────────────────────────────────────────────
  if (phase === "card") return (
    <div style={C.page}><div style={C.card}>
      <button style={C.back} onClick={onBack}>← Ana Sayfa</button>
      {/* Progress bar */}
      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:18 }}>
        <div style={{ flex:1, height:6, background:"rgba(255,255,255,0.07)", borderRadius:3, overflow:"hidden" }}>
          <div style={{ height:"100%", width:`${progress}%`, background:"linear-gradient(90deg,#6060ff,#9090ff)", borderRadius:3, transition:"width 0.4s" }}/>
        </div>
        <span style={{ color:"#6060a0", fontSize:12, flexShrink:0 }}>{doneCount}/{total}</span>
      </div>

      {/* Card */}
      <div
        onClick={() => { if (!flipped) { setFlipped(true); speak(word.fr); } }}
        style={{
          minHeight:200, borderRadius:20, cursor:flipped?"default":"pointer",
          background: flipped
            ? "linear-gradient(135deg,rgba(30,28,70,0.95),rgba(20,20,50,0.95))"
            : "linear-gradient(135deg,rgba(60,50,180,0.4),rgba(40,30,140,0.4))",
          border: flipped ? "1px solid rgba(144,144,255,0.3)" : "2px solid rgba(100,80,255,0.6)",
          display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
          padding:"28px 20px", marginBottom:16, transition:"all 0.3s",
          boxShadow: flipped?"none":"0 8px 32px rgba(80,60,255,0.25)",
        }}
      >
        {!flipped ? (
          <>
            <div style={{ color:"rgba(255,255,255,0.3)", fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:2, marginBottom:16 }}>Fransızca</div>
            <div style={{ color:"#c0b8ff", fontSize:44, fontWeight:900, fontStyle:"italic", textAlign:"center" }}>{word.fr}</div>
            <div style={{ color:"rgba(255,255,255,0.2)", fontSize:12, marginTop:20 }}>👆 Çevirmek için tıkla</div>
          </>
        ) : (
          <>
            <div style={{ color:"rgba(255,255,255,0.3)", fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:2, marginBottom:8 }}>Türkçesi</div>
            <div style={{ color:"#e0e0ff", fontSize:30, fontWeight:800, textAlign:"center", marginBottom:8 }}>{word.tr}</div>
            <div style={{ width:"100%", height:1, background:"rgba(255,255,255,0.08)", margin:"10px 0" }}/>
            <div style={{ color:"#9090ff", fontSize:38, fontWeight:900, fontStyle:"italic", textAlign:"center" }}>{word.fr}</div>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:12 }}>
              <SpeakBtn text={word.fr} speak={speak} cancel={cancel} size={16}/>
              <span style={{ color:"#606080", fontSize:12 }}>telaffuzu dinle</span>
            </div>
          </>
        )}
      </div>

      {/* Example + image after flip */}
      {flipped && word.example && (
        <div style={C.exBox}>
          <div style={C.exLabel}>📖 Örnek cümle</div>
          <div style={{ display:"flex", alignItems:"flex-start", gap:8 }}>
            <span style={{ ...C.exText, flex:1 }}>{word.example}</span>
            <SpeakBtn text={frOnly(word.example)} speak={speak} cancel={cancel} size={12}/>
          </div>
        </div>
      )}
      {flipped && word.img && <WordImage src={word.img} alt={word.imgAlt||word.tr} word={word.fr}/>}

      {/* ✅ / ❌ buttons after flip */}
      {flipped && (
        <div style={{ display:"flex", gap:10, marginTop:8 }}>
          <button
            onClick={() => goNext("hard")}
            style={{ flex:1, padding:"14px 0", borderRadius:14, fontSize:22, background:"rgba(248,113,113,0.12)", border:"2px solid rgba(248,113,113,0.5)", cursor:"pointer", transition:"all 0.15s", display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}
          >
            <span>❌</span>
            <span style={{ color:"#f87171", fontSize:11, fontWeight:700 }}>Bilmedim</span>
          </button>
          <button
            onClick={() => { setPhase("sentence"); setSentInput(""); setSentFeedback(null); }}
            style={{ flex:1, padding:"14px 0", borderRadius:14, fontSize:22, background:"rgba(74,222,128,0.12)", border:"2px solid rgba(74,222,128,0.5)", cursor:"pointer", transition:"all 0.15s", display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}
          >
            <span>✅</span>
            <span style={{ color:"#4ade80", fontSize:11, fontWeight:700 }}>Bildim</span>
          </button>
        </div>
      )}
      {!flipped && (
        <div style={{ color:"#404060", fontSize:12, textAlign:"center", padding:"8px 0" }}>Kartı çevir, sonra bilip bilmediğini işaretle</div>
      )}
    </div></div>
  );

  // ── Sentence phase (Bildim seçilince) ────────────────────────────────────────
  const textSim = sentInput.trim() ? similarity(sentInput.trim(), word.fr) : null;
  const gramCheck = sentFeedback;
  // Gerçek skor: dilbilgisi skoru varsa onu kullan, yoksa similarity
  const realScore = gramCheck?.score ?? (textSim !== null ? textSim : null);
  const passed = realScore !== null && realScore >= 85;

  return (
    <div style={C.page}><div style={C.card}>
      <button style={C.back} onClick={() => setPhase("card")}>← Karta Dön</button>

      {/* Kelime başlığı */}
      <div style={{ textAlign:"center", marginBottom:14 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:10, marginBottom:4 }}>
          <span style={C.frBig}>{word.fr}</span>
          <SpeakBtn text={word.fr} speak={speak} cancel={cancel} size={18}/>
        </div>
        <span style={C.trSub}>{word.tr}</span>
      </div>

      {/* Örnek cümle */}
      {word.example && (
        <div style={C.exBox}>
          <div style={C.exLabel}>📖 Örnek cümle</div>
          <div style={{ display:"flex", alignItems:"flex-start", gap:8 }}>
            <span style={{ ...C.exText, flex:1 }}>{word.example}</span>
            <SpeakBtn text={frOnly(word.example)} speak={speak} cancel={cancel} size={12}/>
          </div>
        </div>
      )}

      {/* Giriş alanı */}
      <div style={C.pBox}>
        <div style={C.pLabel}>✏️ Bu kelimeyle Fransızca bir cümle yaz:</div>
        <textarea style={C.textarea} value={sentInput} onChange={e=>{ setSentInput(e.target.value); setSentFeedback(null); }}
          placeholder={`"${word.fr}" kelimesini kullanarak tam bir Fransızca cümle yaz...`} rows={3}/>

        {/* Similarity göstergesi — yazarken canlı */}
        {sentInput.trim() && !sentFeedback && textSim !== null && (
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8, padding:"6px 10px", borderRadius:10, background:"rgba(255,255,255,0.04)" }}>
            <div style={{ flex:1, height:5, background:"rgba(255,255,255,0.08)", borderRadius:3, overflow:"hidden" }}>
              <div style={{ height:"100%", width:`${textSim}%`, borderRadius:3, transition:"width 0.3s",
                background: textSim>=85?"#4ade80":textSim>=60?"#fbbf24":"#f87171" }}/>
            </div>
            <span style={{ fontSize:12, fontWeight:700, color:textSim>=85?"#4ade80":textSim>=60?"#fbbf24":"#f87171", flexShrink:0 }}>{textSim}%</span>
          </div>
        )}

        {!sentFeedback ? (
          <button style={{...C.btn, opacity:sentInput.trim()&&!sentLoading?1:0.4}}
            onClick={submitSent} disabled={!sentInput.trim()||sentLoading}>
            {sentLoading?"⏳ Kontrol ediliyor...":"Kontrol Et →"}
          </button>
        ) : (
          <div>
            {/* Büyük skor göstergesi */}
            {(() => {
              const sc = gramCheck?.score ?? (textSim||0);
              const ok = sc >= 85;
              const col = sc>=85?"#4ade80":sc>=60?"#fbbf24":"#f87171";
              return (
                <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:12,padding:"14px 16px",borderRadius:16,
                  background:ok?"rgba(74,222,128,0.08)":"rgba(248,113,113,0.08)",
                  border:`1px solid ${ok?"rgba(74,222,128,0.3)":"rgba(248,113,113,0.3)"}`}}>
                  <div style={{textAlign:"center",flexShrink:0}}>
                    <div style={{fontSize:40,fontWeight:900,color:col,lineHeight:1}}>{sc}%</div>
                    <div style={{fontSize:11,fontWeight:700,color:col,marginTop:2}}>{ok?"✅ Geçti":"❌ Geçmedi"}</div>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{height:6,background:"rgba(255,255,255,0.08)",borderRadius:3,overflow:"hidden",marginBottom:6}}>
                      <div style={{height:"100%",width:`${sc}%`,borderRadius:3,background:ok?"#4ade80":sc>=60?"#fbbf24":"#f87171"}}/>
                    </div>
                    <div style={{color:"#a0a0b8",fontSize:12,lineHeight:1.4}}>
                      {ok?"Harika! Sonraki kelimeye geçebilirsin.":"En az %85 gerekli. Hataları düzelt ve tekrar dene."}
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* Detaylı geri bildirim */}
            <div style={{padding:"10px 14px",borderRadius:12,marginBottom:10,
              background:gramCheck?.correct?"rgba(74,222,128,0.05)":"rgba(248,113,113,0.05)",
              border:`1px solid ${gramCheck?.correct?"rgba(74,222,128,0.2)":"rgba(248,113,113,0.2)"}`}}>
              <div style={{color:"#d0d0e8",lineHeight:1.7,fontSize:13,whiteSpace:"pre-line"}}>{gramCheck?.feedback||""}</div>
              {gramCheck?.corrected && (
                <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8,paddingTop:8,borderTop:"1px solid rgba(255,255,255,0.07)"}}>
                  <span style={{color:"#4ade80",fontStyle:"italic",fontSize:13,flex:1}}>→ {gramCheck.corrected}</span>
                  <SpeakBtn text={gramCheck.corrected} speak={speak} cancel={cancel} size={12}/>
                </div>
              )}
            </div>

            {/* Yazdığın cümle */}
            <div style={{padding:"8px 12px",borderRadius:10,marginBottom:10,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)"}}>
              <div style={{color:"#606080",fontSize:10,fontWeight:700,textTransform:"uppercase",marginBottom:3}}>Yazdığın</div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{color:"#a0a0c0",fontStyle:"italic",fontSize:13,flex:1}}>{sentInput.trim()}</span>
                <SpeakBtn text={sentInput.trim()} speak={speak} cancel={cancel} size={11}/>
              </div>
            </div>

            {/* Geçti / Geçmedi butonları */}
            {passed ? (
              <button style={{...C.btn, background:"linear-gradient(135deg,#1a4a2a,#2a7a3a)", border:"1px solid #4ade80", color:"#4ade80", marginTop:4}}
                onClick={() => goNext("known")}>
                {doneCount + 1 >= total ? "🎉 Tüm Kartları Bitir →" : "Sonraki Kart →"}
              </button>
            ) : (
              <div>
                <button style={{...C.btn, marginTop:4, background:"linear-gradient(135deg,#3a1a1a,#6a2a2a)", border:"1px solid #f87171", color:"#f87171"}}
                  onClick={() => { setSentInput(""); setSentFeedback(null); }}>
                  🔄 Tekrar Dene — Düzelt ve Yaz
                </button>
                <button style={{...C.btn, marginTop:6, background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", color:"#505070", fontSize:12}}
                  onClick={() => goNext("known")}>
                  Geç (bu sefer say) →
                </button>
              </div>
            )}
          </div>
        )}
      </div>
    </div></div>
  );
}
